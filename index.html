                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {obj.title}
                      </span>
                      <span style={{ fontSize: '11px', color: 'var(--text-muted)', flexShrink: 0 }}>
                        {health}%
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </div>
        <button onClick={() => setShowImportModal(true)} style={{
          padding: '8px 16px',
          borderRadius: 'var(--radius-md)',
          border: '1px solid var(--teal)',
          backgroundColor: 'transparent',
          color: 'var(--teal)',
          cursor: 'pointer',
          fontSize: '13px',
          fontWeight: 500,
          transition: 'all var(--transition)'
        }}>
          Import Plan
        </button>
        <button
          className="action-button"
          onClick={() => setCurrentView('present')}
          title="View presentation"
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: '6px',
            padding: '8px 16px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--gold)',
            backgroundColor: 'rgba(212, 165, 116, 0.08)',
            color: 'var(--charcoal)',
            cursor: 'pointer',
            fontSize: '13px',
            fontWeight: 500,
            transition: 'all var(--transition)'
          }}
        >
          <svg width="16" height="16" viewBox="0 0 48 48" fill="none" style={{ flexShrink: 0 }}>
            {[0,1,2,3,4].map(i => {
              const angle = (i / 5) * 360 - 90;
              const rad = angle * Math.PI / 180;
              const cx = 24 + Math.cos(rad) * 11;
              const cy = 24 + Math.sin(rad) * 11;
              return <ellipse key={i} cx={cx} cy={cy} rx="6.5" ry="10" fill="#D4A574" opacity={0.8 + i * 0.04} transform={`rotate(${angle + 90} ${cx} ${cy})`} />;
            })}
            <circle cx="24" cy="24" r="6" fill="#D4A574" opacity="0.95" />
            <circle cx="24" cy="24" r="3" fill="#FFF" opacity="0.5" />
          </svg>
          Present
        </button>
        <button
          onClick={() => setShowSettings(true)}
          title="Settings"
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: '6px',
            padding: '8px 16px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--border)',
            backgroundColor: 'transparent',
            color: 'var(--text-secondary)',
            cursor: 'pointer',
            fontSize: '13px',
            fontWeight: 500,
            transition: 'all var(--transition)'
          }}
        >
          ⚙️ Settings
        </button>
      </nav>
      {/* Animated Status Bar */}
      {(() => {
        const allPlansFlat = objectives.flatMap(o => o.plans);
        const avgHealth = objectives.length > 0 ? Math.round(objectives.reduce((s, o) => s + calcHealth(o.plans), 0) / objectives.length) : 0;
        const barColor = avgHealth > 70 ? 'linear-gradient(135deg, #2A6B6B 0%, #3A8B8B 100%)' : avgHealth >= 40 ? 'linear-gradient(135deg, #3A8B8B 0%, #D4A574 100%)' : 'linear-gradient(135deg, #C07A6B 0%, #D4A574 100%)';
        return (
          <div style={{
            position: 'fixed',
            top: isMobile ? undefined : 'var(--nav-height)',
            bottom: isMobile ? 'var(--mobile-nav)' : undefined,
            left: 0,
            right: 0,
            height: '3px',
            background: barColor,
            backgroundSize: '200% 200%',
            animation: 'gradientFlow 3s ease infinite',
            zIndex: 99,
            display: isMobile ? 'none' : 'block'
          }} />
        );
      })()}
    </>
    );
  }

  // ============================================================
  // MOBILE NAV
  // ============================================================
  function renderMobileNav() {
    if (!isMobile) return null;
    return (
      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        backgroundColor: 'rgba(250, 250, 247, 0.95)',
        borderTop: '1px solid var(--border)',
        backdropFilter: 'blur(10px)',
        display: 'flex',
        justifyContent: 'space-around',
        zIndex: 100,
        height: 'var(--mobile-nav)',
        paddingBottom: 'max(8px, env(safe-area-inset-bottom))'
      }}>
        {[
          { id: 'present', label: 'Present', icon: '✿' },
          { id: 'garden', label: 'Garden', icon: '🌳' },
          { id: 'timeline', label: 'Timeline', icon: '📅' },
          { id: 'bloom', label: 'Bloom', icon: '🌻' },
          { id: 'settings', label: 'Settings', icon: '⚙️' }
        ].map(t => {
          let badge = null;
          if (t.id === 'garden') {
            badge = objectives.length;
          } else if (t.id === 'bloom') {
            const allPlans = objectives.flatMap(o => o.plans);
            badge = allPlans.filter(p => p.atRisk).length;
          }
          return (
            <button key={t.id} onClick={() => {
              if (t.id === 'settings') {
                setShowSettings(true);
              } else {
                setShowSettings(false);
                setCurrentView(t.id);
                if (t.id !== 'bloom') setSelectedObjective(null);
              }
            }} style={{
              flex: 1,
              background: 'none',
              border: 'none',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '4px',
              color: (t.id === 'settings' ? showSettings : currentView === t.id) ? 'var(--teal)' : 'var(--text-muted)',
              fontSize: '12px',
              cursor: 'pointer',
              padding: '8px',
              transition: 'color var(--transition)',
              position: 'relative'
            }}>
              <span style={{ fontSize: '20px', position: 'relative' }}>
                {t.icon}
                {badge > 0 && (
                  <span style={{
                    position: 'absolute', top: '-4px', right: '-6px',
                    width: '16px', height: '16px', borderRadius: '50%',
                    backgroundColor: 'var(--amber)', color: 'white',
                    fontSize: '10px', fontWeight: 600,
                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}>
                    {badge}
                  </span>
                )}
              </span>
              <span>{t.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  // ============================================================
  // RENDER
  // ============================================================
  const currentContent = showSettings
    ? renderSettingsView()
    : selectedObjective && currentView === 'bloom'
    ? renderBloomView()
    : currentView === 'present'
      ? renderPresentView()
      : currentView === 'timeline'
        ? renderTimelineView()
        : renderGardenView();

  return (
    <>
      {!isLoggedIn ? (
        <LoginPage onLogin={setIsLoggedIn} />
      ) : (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      minHeight: '100vh',
      backgroundColor: 'var(--surface)'
    }}>
      {renderNavbar()}
      <main style={{
        flex: 1,
        marginTop: isMobile ? 0 : 'var(--nav-height)',
        paddingTop: isMobile ? '12px' : '20px'
      }}>
        {currentContent}
      </main>
      {renderMobileNav()}

      <CommandPalette
        isOpen={showCommandPalette}
        onClose={() => setShowCommandPalette(false)}
        objectives={objectives}
        selectedObjective={selectedObjective}
        onNavigate={(action, obj) => {
          if (action === 'add-obj') setShowAddObjective(true);
          else if (action === 'add-plan') setShowAddPlan(true);
          else if (action === 'settings') setShowSettings(true);
          else if (action === 'obj') setSelectedObjective(obj);
        }}
      />

      <AddObjectiveModal
        isOpen={showAddObjective}
        onClose={() => setShowAddObjective(false)}
        onAdd={({ title, description, traction }) => {
          const newObj = createObjective(title, description, traction);
          setObjectives([...objectives, newObj]);
        }}
      />

      <AddPlanModal
        isOpen={showAddPlan}
        onClose={() => setShowAddPlan(false)}
        onAdd={({ title, owner, targetDate, startDate }) => {
          if (selectedObjective) {
            const newPlan = createPlan(title, STATUS.SEED, owner, 0, targetDate, startDate);
            const updated = {
              ...selectedObjective,
              plans: [...selectedObjective.plans, newPlan]
            };
            setSelectedObjective(updated);
            setObjectives(objectives.map(o => o.id === selectedObjective.id ? updated : o));
          }
        }}
      />

      <EditObjectiveModal
        isOpen={!!editingObjective}
        onClose={() => setEditingObjective(null)}
        objective={editingObjective}
        onSave={(updatedObj) => {
          setObjectives(objectives.map(o => o.id === updatedObj.id ? updatedObj : o));
          if (selectedObjective && selectedObjective.id === updatedObj.id) {
            setSelectedObjective(updatedObj);
          }
          setEditingObjective(null);
        }}
      />

      <EditPlanModal
        isOpen={!!editingPlan}
        onClose={() => setEditingPlan(null)}
        plan={editingPlan}
        onSave={(updatedPlan) => {
          const updatePlanInObjectives = (objs) => objs.map(obj => ({
            ...obj,
            plans: obj.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
          }));
          setObjectives(updatePlanInObjectives(objectives));
          if (selectedObjective) {
            setSelectedObjective({
              ...selectedObjective,
              plans: selectedObjective.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
            });
          }
          setEditingPlan(null);
        }}
      />

      <Modal
        isOpen={showImportModal}
        title="Import Strategic Plan"
        onClose={() => {
          setShowImportModal(false);
          setImportText('');
        }}
        footer={
          <>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: '1px solid var(--border)',
              background: 'var(--card)',
              color: 'var(--charcoal)',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Cancel
            </button>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: 'none',
              background: 'var(--teal)',
              color: 'white',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Parse & Import
            </button>
          </>
        }
      >
        <textarea
          placeholder="Paste your strategic plan document here..."
          value={importText}
          onChange={(e) => setImportText(e.target.value)}
          style={{
            width: '100%',
            height: '200px',
            padding: '12px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--border)',
            fontFamily: 'monospace',
            fontSize: '12px',
            color: 'var(--charcoal)',
            resize: 'none',
            marginBottom: '12px'
          }}
        />
        <p style={{ fontSize: '12px', color: 'var(--text-muted)', margin: 0 }}>
          The app will parse headers, numbered lists, and bullet points to extract objectives and tactical plans.
        </p>
      </Modal>

      {/* Keyboard Hint Chip */}
      {keyboardHintVisible && !isMobile && (
        <div style={{
          position: 'fixed',
          bottom: '24px',
          right: '24px',
          zIndex: 999,
          animation: 'slideIn 0.4s ease-out, fadeIn 0s 5s forwards'
        }}>
          <div style={{
            display: 'inline-flex',
            alignItems: 'center',
            gap: '8px',
            padding: '8px 14px',
            borderRadius: '20px',
            fontSize: '10px',
            fontWeight: 500,
            backgroundColor: 'rgba(255,255,255,0.75)',
            backdropFilter: 'blur(20px)',
            border: '1px solid rgba(0,0,0,0.08)',
            color: 'var(--text-secondary)',
            boxShadow: '0 4px 12px rgba(0,0,0,0.08)'
          }}>
            <kbd style={{ padding: '2px 4px', backgroundColor: 'rgba(0,0,0,0.05)', borderRadius: '2px', fontSize: '9px' }}>
              {navigator.platform.toLowerCase().includes('mac') ? '⌘' : 'Ctrl'}+K
            </kbd>
            <span>to search</span>
          </div>
        </div>
      )}
    </div>
      )}
    </>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
