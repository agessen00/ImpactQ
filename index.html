const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function createObjective(title = '', description = '', tractionLevel = TRACTION_LEVELS.ANNUAL) {
  return {
    id: uid(),
    title,
    description,
    tractionLevel,
    plans: [],
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

function createPlan(title = '', status = STATUS.SEED, owner = '', progress = 0, targetDate = null, startDate = null) {
  return {
    id: uid(),
    title,
    status,
    progress,
    owner,
    targetDate,
    startDate,
    atRisk: false,
    keyResults: [],
    milestones: [],
    notes: '',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()

function calcHealth(plans) {
  if (!plans || !plans.length) return 0;
  const w = {
    [STATUS.BLOOMED]: 100,
    [STATUS.BUDDING]: 60,
    [STATUS.SPROUTING]: 30,
    [STATUS.SEED]: 0
  };
  return Math.round(plans.reduce((s, p) => s + (p.progress > 0 ? p.progress : (w[p.status] || 0)), 0) / plans.length);
}

function healthColor(h) {
  if (h >= 75) return '#D4A574';
  if (h >= 50) return '#8A9B8E';
  if (h >= 25) return '#2A6B6B';
  return '#C07A6B';
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
}

function onTrackCount(plans) {
  return plans.filter(p => !p.atRisk).length;
}

function daysRemaining(targetDate) {
  if (!targetDate) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(targetDate);
  target.setHours(0, 0, 0, 0);
  const diff = target - today;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function timeConsumedPercent(startDate, targetDate) {
  if (!startDate || !targetDate) return 0;
  const start = new Date(startDate);
  const target = new Date(targetDate);
  const today = new Date();
  const totalDuration = target - start;
  const elapsed = today - start;
  const percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
  return Math.round(percent);
}

function getBorderColor(health, atRisk) {
  if (atRisk) return '#C07A6B';
  if (health >= 75) return '#D4A574';
  if (health >= 25) return '#2A6B6B';
  return '#E8E5DC';
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
function initParticles(health = 50) {
  const c = document.getElementById('particle-canvas');
  if (!c) return () => {};
  const ctx = c.getContext('2d');
  let particles = [], af;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  if (reduced) return () => {};
  const N = Math.min(45, Math.floor(window.innerWidth / 30));
  const baseVyMultiplier = health > 70 ? 1.8 : health < 30 ? 0.4 : 1.0;
  const cols = health > 70 ? ['100,180,150', '42,107,107', '138,155,142'] : health < 30 ? ['212,165,116', '192,122,107', '168,155,107'] : ['138,155,142', '42,107,107', '212,165,116', '168,155,107'];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: 1.0 + Math.random() * 2.5, vx: (Math.random() - 0.5) * 0.2, vy: (-0.1 - Math.random() * 0.15) * baseVyMultiplier,
      col: cols[Math.floor(Math.random() * cols.length)], ph: Math.random() * Math.PI * 2, sp: 0.001 + Math.random() * 0.003,
      drift: (Math.random() - 0.5) * 0.01, type: health > 70 && Math.random() < 0.15 ? 'sparkle' : 'normal', life: 1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    const t = Date.now() * 0.001;
    particles.forEach(p => {
      p.x += p.vx + Math.sin(t * 0.5 + p.ph) * p.drift;
      p.y += p.vy;
      if (p.x < -10) p.x = c.width + 10; if (p.x > c.width + 10) p.x = -10;
      if (p.y < -10) p.y = c.height + 10; if (p.y > c.height + 10) p.y = -10;
      let o = 0.06 + 0.08 * Math.sin(t * p.sp * 100 + p.ph);
      if (p.type === 'sparkle') {
        o = Math.min(1, o * 2);
      }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (p.type === 'sparkle' ? 1.5 : 1), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${o})`; ctx.fill();
    });
    af = requestAnimationFrame(draw);
  }
  draw();
  return () => { cancelAnimationFrame(af); window.removeEventListener('resize', resize); };
}

function StatusIcon({ status, size = 48 }) {

  }

// ============================================================
// MODAL with FOCUS TRAP
// ============================================================
function Modal({ isOpen, title, children, onClose, footer }) {
  const modalRef = useRef(null);
  const firstFocusRef = useRef(null);

  useEffect(() => {
    if (isOpen && modalRef.current) {
      const handleKeyDown = (e) => {
        if (e.key === 'Escape') onClose();
        if (e.key === 'Tab') {
          const focusable = modalRef.current.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          );
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey) {
            if (document.activeElement === first) {
              last.focus();
              e.preventDefault();
            }
          } else {
            if (document.activeElement === last) {
              first.focus();
              e.preventDefault();
            }
          }
        }
      };
      modalRef.current.addEventListener('keydown', handleKeyDown);
      firstFocusRef.current?.focus();
      return () => modalRef.current?.removeEventListener('keydown', handleKeyDown);
    }
  }, [isOpen, onClose]);

  if (!isOpen) return null;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(0, 0, 0, 0.4)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, animation: 'fadeIn 0.2s'
    }} onClick={onClose}>
      <div ref={modalRef} style={{
        backgroundColor: 'var(--card)',
        borderRadius: 'var(--radius-lg)',
        border: '1px solid var(--border)',
        padding: '24px',
        maxWidth: '500px',
        width: '90%',
        maxHeight: '80vh',
        overflow: 'auto',
        boxShadow: 'var(--shadow-xl)',
        animation: 'scaleIn 0.3s'
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <h2 style={{ fontFamily: "'Instrument Serif'", fontSize: '20px' }}>{title}</h2>
          <button ref={firstFocusRef} onClick={onClose} style={{
            background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer',
            color: 'var(--text-muted)', padding: '8px', width: '44px', height: '44px',
            display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--radius-md)'
          }} aria-label="Close modal">×</button>
        </div>
        {children}
        {footer && <div style={{ marginTop: '24px', display: 'flex', gap: '12px', justifyContent: 'flex-end' }}>{footer}</div>}
      </div>
    </div>
  );
}

                notes: notes.trim(),
                status,
                updatedAt: new Date().toISOString()
              });
              onClose();
            }
          }} style={{
            padding: '8px 16px', borderRadius: 'var(--radius-md)',
            border: 'none', background: 'var(--teal)',
            color: 'white', cursor: 'pointer', fontSize: '13px', fontWeight: 500
          }}>Save Changes</button>
        </>
      }
    >
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Title</label>
      <input
        type="text"
        placeholder="Plan title"
        value={title}
        onChange={(e) => setTitle(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px'
        }}
      />
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Owner</label>
      <input
        type="text"
        placeholder="Owner name"
        value={owner}
        onChange={(e) => setOwner(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px'
        }}
      />
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Status</label>
      <select
        value={status}
        onChange={(e) => setStatus(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px'
        }}
      >
        <option value={STATUS.SEED}>🌱 Seed</option>
        <option value={STATUS.SPROUTING}>🌿 Sprouting</option>
        <option value={STATUS.BUDDING}>🌼 Budding</option>
        <option value={STATUS.BLOOMED}>🌻 Bloomed</option>
      </select>
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Progress: {progress}%</label>
      <input
        type="range"
        min="0"
        max="100"
        step="5"
        value={progress}
        onChange={(e) => setProgress(e.target.value)}
        style={{
          width: '100%', marginBottom: '12px', accentColor: 'var(--teal)'
        }}
      />
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Start Date</label>
      <input
        type="date"
        value={startDate}
        onChange={(e) => setStartDate(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px'
        }}
      />
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Target Date</label>
      <input
        type="date"
        value={targetDate}
        onChange={(e) => setTargetDate(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px'
        }}
      />
      <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Notes</label>
      <textarea
        placeholder="Notes (optional)"
        value={notes}
        onChange={(e) => setNotes(e.target.value)}
        style={{
          width: '100%', padding: '10px', marginBottom: '12px', height: '80px',
          border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          fontFamily: 'inherit', fontSize: '14px', resize: 'none'
        }}
      />
    </Modal>
  );
}

// OBJECTIVE CARD (GARDEN VIEW)
// ============================================================
function ObjectiveCard({ objective, onClick, onEdit, onDelete, index = 0 }) {
  const health = calcHealth(objective.plans);
  const onTrack = onTrackCount(objective.plans);
  const total = objective.plans.length;
  const hasAtRisk = objective.plans.some(p => p.atRisk);
  const borderColor = getBorderColor(health, hasAtRisk);
  const tractionLabel = {
    [TRACTION_LEVELS.ROCK]: 'Strategic Rock',
    [TRACTION_LEVELS.ANNUAL]: 'Annual Plan',
    [TRACTION_LEVELS.THREE_YEAR]: '3-Year Picture'
  }[objective.tractionLevel];

  return (
    <div onClick={onClick} style={{
      backgroundColor: 'var(--card)',
      border: '1px solid var(--border)',
      borderRadius: 'var(--radius-lg)',
      padding: '20px',
      cursor: 'pointer',
      transition: 'all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1.0)',
      animation: `slideUpStagger 0.5s ease-out ${index * 0.08}s both`,
      position: 'relative',
      display: 'flex',
      flexDirection: 'column',
      gap: '12px',
      borderLeft: `4px solid ${borderColor}`
    }}
      onMouseEnter={(e) => {
        e.currentTarget.style.transform = 'translateY(-3px)';
        e.currentTarget.style.boxShadow = '0 12px 40px rgba(61,56,53,0.12)';
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.transform = 'translateY(0)';
        e.currentTarget.style.boxShadow = 'var(--shadow-sm)';
      }}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px', position: 'relative' }}>
        <div style={{ flex: 1 }}>
          <h3 style={{ fontFamily: "'Instrument Serif'", fontSize: '16px', marginBottom: '4px', color: 'var(--charcoal)' }}>
            {objective.title}
          </h3>
          <p style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '8px' }}>
            {onTrack} of {total} tactical plans on track
          </p>
          <span style={{
            display: 'inline-block',
            fontSize: '11px',
            backgroundColor: 'rgba(42, 107, 107, 0.1)',
            color: 'var(--teal)',
            padding: '4px 8px',
            borderRadius: 'var(--radius-sm)',
            marginBottom: '12px'
          }}>
            {tractionLabel}
          </span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', position: 'relative' }}>
          {/* RAG dot badge top-right */}
          <div style={{
            position: 'absolute', top: '-8px', right: '-8px',
            width: '12px', height: '12px', borderRadius: '50%',
            backgroundColor: health >= 75 ? '#D4A574' : health >= 50 ? '#8A9B8E' : health >= 25 ? '#2A6B6B' : '#C07A6B',
            border: '2px solid white',
            zIndex: 10, animation: 'dotPulse 2s ease-in-out infinite'
          }} />
          <svg width="56" height="56" viewBox="0 0 56 56" style={{ flexShrink: 0 }} role="img" aria-label={`${health}% health`}>
            <circle cx="28" cy="28" r="24" fill="none" stroke={healthColor(health)} strokeWidth="4" opacity="0.2" />
            <circle cx="28" cy="28" r="24" fill="none" stroke={healthColor(health)} strokeWidth="4"
              strokeDasharray={`${(health / 100) * 150.8} 150.8`}
              strokeLinecap="round" transform="rotate(-90 28 28)" />
            <text x="28" y="32" textAnchor="middle" fontSize="14" fontWeight="600" fill={healthColor(health)}>
              {health}%
            </text>
          </svg>
          <div style={{ display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px', fontWeight: 600, color: 'var(--text-secondary)' }}>
            {health >= 50 ? '↑' : health > 25 ? '→' : '↓'} Velocity
          </div>
        </div>
      </div>
      <div style={{
        display: 'flex',
        gap: '4px',
        flexWrap: 'wrap'
      }}>
        {objective.plans.slice(0, 8).map(p => (
          <div key={p.id} style={{
            width: '8px',
            height: '8px',
            borderRadius: '50%',
            backgroundColor: STATUS_META[p.status]?.color || '#ccc',
            opacity: p.atRisk ? 1 : 0.8,
            transition: 'all var(--transition)',
            border: p.atRisk ? `2px solid #C07A6B` : 'none'
          }} title={p.title} />
        ))}
      </div>
      <div style={{ display: 'flex', gap: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' }}>
        <button onClick={(e) => {
          e.stopPropagation();
          onEdit();
        }} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid var(--border)',
          background: 'var(--card)', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: 'var(--text-secondary)'

        <button onClick={(e) => {
          e.stopPropagation();
          if (confirm('Delete this objective and all its plans?')) {
            onDelete();
          }
        }} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid #ccc',
          background: '#fff', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: '#d32f2f'
        }}>Delete</button>
      </div>
    </div>
  );
}

// ============================================================
// PLAN CARD (BLOOM VIEW)
// ============================================================
function PlanCard({ plan, objective, onEdit, onDelete, onStatusChange, onProgressChange, onAtRiskToggle, onKRToggle }) {
  const [celebrationEmoji, setCelebrationEmoji] = useState(null);
  const statusMeta = STATUS_META[plan.status] || STATUS_META[STATUS.SEED];
  const krRatio = plan.keyResults.filter(kr => kr.completed).length;
  const krTotal = plan.keyResults.length;
  const days = daysRemaining(plan.targetDate);
  const timePercent = timeConsumedPercent(plan.startDate, plan.targetDate);
  const borderColor = getBorderColor(plan.progress, plan.atRisk);

  const handleStatusChange = () => {
    const current = plan.status;
    let newStatus = STATUS.SEED;
    if (current === STATUS.SEED) newStatus = STATUS.SPROUTING;
    else if (current === STATUS.SPROUTING) newStatus = STATUS.BUDDING;
    else if (current === STATUS.BUDDING) newStatus = STATUS.BLOOMED;

    // Trigger celebration
    if (newStatus === STATUS.SPROUTING) setCelebrationEmoji('🌿');
    else if (newStatus === STATUS.BUDDING) setCelebrationEmoji('🌼');
    else if (newStatus === STATUS.BLOOMED) setCelebrationEmoji('🌻');

    setTimeout(() => setCelebrationEmoji(null), 1200);
    onStatusChange();
  };

  return (
    <div style={{
      backgroundColor: 'var(--card)',
      border: '1px solid var(--border)',
      borderRadius: 'var(--radius-lg)',
      padding: '20px',
      animation: 'fadeInUp 0.4s ease-out',
      borderLeft: `4px solid ${borderColor}`,
      position: 'relative'
    }}>
      {plan.atRisk && (
        <div style={{
          position: 'absolute', top: '12px', right: '12px',
          display: 'flex', alignItems: 'center', gap: '4px'
        }}>
          <AtRiskOverlay size={20} />
        </div>
      )}

      <div style={{ display: 'flex', gap: '12px', marginBottom: '12px', alignItems: 'flex-start', position: 'relative' }}>
        {celebrationEmoji && (
          <div style={{
            position: 'absolute', left: '20px', top: '10px',
            fontSize: '32px', zIndex: 10,
            animation: 'confettiBurst 1s ease-out forwards',
            pointerEvents: 'none'
          }}>
            {celebrationEmoji}
          </div>
        )}
        <StatusIcon status={plan.status} size={40} />
        <div style={{ flex: 1 }}>
          <h3 style={{ fontFamily: "'Instrument Serif'", fontSize: '15px', marginBottom: '4px' }}>
            {plan.title}
          </h3>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '8px', alignItems: 'center' }}>
            <button onClick={handleStatusChange} style={{
              fontSize: '11px',
              backgroundColor: statusMeta.bg,
              color: statusMeta.color,
              padding: '4px 8px',
              borderRadius: 'var(--radius-sm)',
              fontWeight: 500,
              border: 'none',
              cursor: 'pointer',
              transition: 'all var(--transition)'
            }} title="Click to cycle status">
              {statusMeta.label}
            </button>
            {plan.targetDate && (
              <span style={{
                fontSize: '11px',
                backgroundColor: days <= 7 ? 'rgba(192, 122, 107, 0.1)' : 'rgba(42, 107, 107, 0.1)',
                color: days <= 7 ? 'var(--amber)' : 'var(--text-muted)',
                padding: '4px 8px',
                borderRadius: 'var(--radius-sm)',
                fontWeight: 500
              }}>
                {days > 0 ? `${days}d left` : days === 0 ? 'Due today' : 'Overdue'}
              </span>
            )}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
            <input
              type="range"
              min="0"
              max="100"
              step="5"
              value={plan.progress}
              onChange={(e) => onProgressChange(Number(e.target.value))}
              style={{ flex: 1, accentColor: 'var(--teal)', height: '6px', cursor: 'pointer' }}
              title="Drag to update progress"
            />
            <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--charcoal)', minWidth: '35px' }}>
              {plan.progress}%
            </span>
          </div>
          {plan.startDate && plan.targetDate && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
              <div style={{
                height: '4px',
                flex: 1,
                backgroundColor: 'rgba(0,0,0,0.05)',
                borderRadius: '2px',
                overflow: 'hidden'
              }}>
                <div style={{
                  height: '100%',
                  width: `${timePercent}%`,
                  background: 'rgba(200,200,200,0.6)',
                  transition: 'width 0.3s'
                }} />
              </div>
              <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{timePercent}% time</span>
            </div>
          )}
          {plan.owner && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}>
              <div style={{
                width: '24px',
                height: '24px',
                borderRadius: '50%',
                backgroundColor: 'var(--teal)',
                color: 'white',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '10px',
                fontWeight: 600
              }}>
                {initials(plan.owner)}
              </div>
              <span style={{ color: 'var(--text-secondary)' }}>{plan.owner}</span>
            </div>
          )}
        </div>
      </div>

      {plan.keyResults && plan.keyResults.length > 0 && (
        <div style={{ marginTop: '16px', paddingTop: '12px', borderTop: '1px solid var(--border)' }}>
          <div style={{ fontSize: '12px', fontWeight: 600, marginBottom: '8px', color: 'var(--charcoal)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span>Key Results ({krRatio}/{krTotal})</span>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 400 }}>
              Tip: Make KRs measurable
            </div>
          </div>
          {plan.keyResults.map((kr, i) => (
            <div key={kr.id || i} style={{
              display: 'flex',
              alignItems: 'flex-start',
              gap: '8px',
              fontSize: '13px',
              marginBottom: '6px',
              color: kr.completed ? 'var(--text-muted)' : 'var(--text-secondary)'
            }}>
              <input type="checkbox" checked={kr.completed || false} style={{ marginTop: '2px', cursor: 'pointer' }} onChange={() => onKRToggle && onKRToggle(kr.id)} />
              <span style={{ textDecoration: kr.completed ? 'line-through' : 'none' }}>
                {kr.text}
              </span>
            </div>
          ))}
        </div>
      )}

      {plan.milestones && plan.milestones.length > 0 && (
        <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-muted)' }}>
          <span style={{ fontWeight: 600 }}>
            {plan.milestones.filter(m => m.completed).length}/{plan.milestones.length}
          </span> milestones completed
        </div>
      )}

      <div style={{ display: 'flex', gap: '8px', paddingTop: '12px', borderTop: '1px solid var(--border)', marginTop: '12px' }}>
        <button onClick={() => onAtRiskToggle()} style={{
          padding: '6px 12px', fontSize: '12px', border: plan.atRisk ? 'none' : '1px solid var(--border)',
          background: plan.atRisk ? 'rgba(192, 122, 107, 0.15)' : 'var(--card)',
          borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 500,
          color: plan.atRisk ? 'var(--amber)' : 'var(--text-secondary)'
        }}>
          {plan.atRisk ? 'Remove At-Risk' : 'Mark At-Risk'}
        </button>
        <button onClick={() => onEdit()} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid var(--border)',
          background: 'var(--card)', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: 'var(--text-secondary)'
        }}>Edit</button>
        <button onClick={() => {
          if (confirm('Delete this plan?')) {
            onDelete();
          }
        }} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid #ccc',
          background: '#fff', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: '#d32f2f'
        }}>Delete</button>
      </div>
    </div>
  );
}

  const theme = localStorage.getItem('impactq_theme') || 'classic';

    const visited = localStorage.getItem('impactq_visited');

      setTimeout(() => onLogin(true), 1500);

// ============================================================
// COMMAND PALETTE COMPONENT
// ============================================================
function CommandPalette({ isOpen, onClose, objectives, selectedObjective, onNavigate }) {
  const [search, setSearch] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (isOpen && inputRef.current) {
      inputRef.current.focus();
    }
  }, [isOpen]);

  const allItems = [
    { id: 'add-obj', type: 'action', label: 'Add Objective', hotkey: 'Ctrl+Shift+O', action: () => { onNavigate('add-obj'); onClose(); } },
    { id: 'add-plan', type: 'action', label: 'Add Plan', hotkey: 'Ctrl+Shift+P', action: () => { onNavigate('add-plan'); onClose(); } },
    { id: 'settings', type: 'action', label: 'Settings', hotkey: 'Ctrl+,', action: () => { onNavigate('settings'); onClose(); } },
    ...objectives.map(obj => ({
      id: `obj-${obj.id}`,
      type: 'objective',
      label: obj.title,
      action: () => { onNavigate('obj', obj); onClose(); }
    }))
  ];

  const filtered = search
    ? allItems.filter(item => item.label.toLowerCase().includes(search.toLowerCase()))
    : allItems.slice(0, 8);

  if (!isOpen) return null;

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(0, 0, 0, 0.5)',
      backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      zIndex: 2000, paddingTop: '100px',
      animation: 'fadeIn 0.2s'
    }} onClick={onClose}>
      <div style={{
        backgroundColor: 'var(--card)',
        borderRadius: 'var(--radius-lg)',
        border: '1px solid var(--border)',
        boxShadow: 'var(--shadow-xl)',
        width: '90%', maxWidth: '500px',
        overflow: 'hidden',
        animation: 'slideDown 0.3s ease-out'
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)' }}>
          <input
            ref={inputRef}
            type="text"
            placeholder="Search objectives or actions..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            style={{
              width: '100%', padding: '8px', fontSize: '14px',
              border: 'none', background: 'transparent', outline: 'none',
              fontFamily: 'inherit'
            }}
          />
        </div>
        <div style={{ maxHeight: '320px', overflow: 'auto' }}>
          {filtered.length > 0 ? (
            filtered.map((item, idx) => (
              <button
                key={item.id}
                onClick={item.action}
                style={{
                  width: '100%', padding: '12px 16px', textAlign: 'left',
                  border: 'none', background: idx % 2 === 0 ? 'transparent' : 'rgba(42,107,107,0.02)',
                  cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  fontSize: '13px', color: 'var(--charcoal)', transition: 'background 0.1s'
                }}
                onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(42,107,107,0.08)'}
                onMouseLeave={(e) => e.currentTarget.style.background = idx % 2 === 0 ? 'transparent' : 'rgba(42,107,107,0.02)'}
              >
                <span>{item.label}</span>
                {item.hotkey && <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{item.hotkey}</span>}
              </button>
            ))
          ) : (
            <div style={{ padding: '32px 16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
              No results found
            </div>
          )}
        </div>
        <div style={{ padding: '8px 16px', borderTop: '1px solid var(--border)', fontSize: '10px', color: 'var(--text-muted)' }}>
          Press <kbd style={{ padding: '2px 6px', backgroundColor: 'var(--pale-bg)', borderRadius: '3px' }}>Esc</kbd> to close
        </div>
      </div>
    </div>
  );
}

// ============================================================
// LOADING OVERLAY COMPONENT
// ============================================================
function LoadingOverlay({ isLoading }) {
  const [stage, setStage] = useState(0);

  useEffect(() => {
    if (!isLoading) return;
    const interval = setInterval(() => {
      setStage(s => (s + 1) % 4);
    }, 300);
    return () => clearInterval(interval);
  }, [isLoading]);

  if (!isLoading) return null;

  const stages = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];

  const progressPercent = Math.min(80 + stage * 5, 95);

  return (
    <div role="status" aria-live="polite" aria-label="Loading application" style={{
      position: 'fixed',
      top: 0,
      left: 0,
      right: 0,
      bottom: 0,
      background: 'var(--surface)',
      opacity: 0.95,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: 8888,
      backdropFilter: 'blur(2px)'
    }}>
      <div style={{ animation: 'seedPulse 2s ease-in-out infinite' }} aria-hidden="true">
        <StatusIcon status={stages[stage]} size={80} />
      </div>
      <div style={{
        marginTop: '32px',
        fontSize: '16px',
        fontWeight: 600,
        color: 'var(--charcoal)',
        letterSpacing: '0.5px'
      }}>
        Growing your insights...
      </div>
      <div style={{
        marginTop: '16px',
        height: '4px',
        width: '120px',
        background: 'var(--border)',
        borderRadius: '2px',
        overflow: 'hidden'
      }} role="progressbar" aria-valuenow={progressPercent} aria-valuemin="0" aria-valuemax="100">
        <div style={{
          height: '100%',
          background: 'linear-gradient(90deg, var(--teal), var(--sage))',
          transition: 'width 0.4s ease-in-out',
          width: `${progressPercent}%`
        }} />
      </div>
      <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-muted)' }}>
        {progressPercent}%
      </div>
    </div>
  );
}

  });

  const [fiscalYearStart, setFiscalYearStart] = useState(() => localStorage.getItem('impactq_fiscal_year') || '1');

  const [gardenViewMode, setGardenViewMode] = useState('grid');
  const [keyboardHintVisible, setKeyboardHintVisible] = useState(true);

  useEffect(() => {
    saveData(objectives);
  }, [objectives]);

  useEffect(() => {
    const cleanup = initParticles();
    return cleanup;
  }, []);

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 767px)');
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        setShowCommandPalette(!showCommandPalette);
      }
      if (e.key === 'Escape') {
        setShowCommandPalette(false);
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [showCommandPalette]);

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'renaissance') {
      root.classList.add('theme-renaissance');
      root.classList.remove('theme-dark');
    } else if (theme === 'dark') {
      root.classList.add('theme-dark');
      root.classList.remove('theme-renaissance');
    } else {
      root.classList.remove('theme-renaissance', 'theme-dark');
    }
    localStorage.setItem('impactq_theme', theme);
  }, [theme]);

  useEffect(() => {
    if (keyboardHintVisible && !isMobile) {
      const timer = setTimeout(() => setKeyboardHintVisible(false), 5000);
      return () => clearTimeout(timer);
    }
  }, [keyboardHintVisible, isMobile]);

  const getUniqueOwners = () => {
    const owners = new Set();
    objectives.forEach(obj => {
      obj.plans.forEach(plan => {
        if (plan.owner) owners.add(plan.owner);
      });
    });
    return Array.from(owners).sort();
  };

  const sortAndFilterPlans = (plans) => {
    let result = plans;

    if (filterStatus) {
      result = result.filter(p => p.status === filterStatus);
    }
    if (filterOwner) {
      result = result.filter(p => p.owner === filterOwner);
    }

    result.sort((a, b) => {
      switch(sortBy) {
        case 'progress':
          return b.progress - a.progress;
        case 'duedate':
          if (!a.targetDate && !b.targetDate) return 0;
          if (!a.targetDate) return 1;
          if (!b.targetDate) return -1;
          return new Date(a.targetDate) - new Date(b.targetDate);
        case 'owner':
          return (a.owner || '').localeCompare(b.owner || '');
        case 'status':
        default:
          const statusOrder = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];
          return statusOrder.indexOf(a.status) - statusOrder.indexOf(b.status);
      }
    });

    return result;
  };

          }}>+ Add Plan</button>

          }}>

            }}>
              <option value="">All Status</option>
              <option value={STATUS.SEED}>Seed</option>
              <option value={STATUS.SPROUTING}>Sprouting</option>
              <option value={STATUS.BUDDING}>Budding</option>
              <option value={STATUS.BLOOMED}>Bloomed</option>
            </select>
            <select value={filterOwner} onChange={(e) => setFilterOwner(e.target.value)} style={{
              padding: '6px 10px', fontSize: '12px', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', background: 'var(--card)', cursor: 'pointer'
            }}>
              <option value="">All Owners</option>
              {getUniqueOwners().map(owner => (
                <option key={owner} value={owner}>{owner}</option>
              ))}
            </select>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(350px, 1fr))',
            gap: '16px'
          }}>
            {filteredPlans.map(plan => (
              <PlanCard
                key={plan.id}
                plan={plan}
                objective={selectedObjective}
                onEdit={() => {
                  setEditingPlan(plan);
                }}
                onDelete={() => {
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.filter(p => p.id !== plan.id)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.filter(p => p.id !== plan.id) }
                      : o
                  ));
                }}
                onStatusChange={() => {
                  const statuses = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];
                  const currentIdx = statuses.indexOf(plan.status);
                  const nextIdx = (currentIdx + 1) % statuses.length;
                  const updatedPlan = { ...plan, status: statuses[nextIdx] };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onProgressChange={(val) => {
                  const updatedPlan = { ...plan, progress: val };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onAtRiskToggle={() => {
                  const updatedPlan = { ...plan, atRisk: !plan.atRisk };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onKRToggle={(krId) => {
                  const updatedPlan = {
                    ...plan,
                    keyResults: plan.keyResults.map(kr =>
                      kr.id === krId ? { ...kr, completed: !kr.completed } : kr
                    )
                  };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
              />
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // RENDER TIMELINE VIEW (Gantt-style calendar)
  // ============================================================
  function renderTimelineView() {
    const allPlans = [];
    objectives.forEach(obj => {
      obj.plans.forEach(plan => {
        allPlans.push({ ...plan, objectiveName: obj.name, objectiveId: obj.id, name: plan.title });
      });
    });

    const year = tlMonth.year;
    const month = tlMonth.month;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
    const todayDate = isCurrentMonth ? today.getDate() : -1;
    const monthName = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const plansByObjective = {};
    allPlans.forEach(plan => {
      if (!plansByObjective[plan.objectiveName]) plansByObjective[plan.objectiveName] = [];
      plansByObjective[plan.objectiveName].push(plan);
    });

    const getPlanDayRange = (plan) => {
      const start = new Date(plan.startDate);
      const end = new Date(plan.targetDate);
      const startDay = start.getMonth() === month && start.getFullYear() === year ? start.getDate() : (start < firstDay ? 1 : daysInMonth);
      const endDay = end.getMonth() === month && end.getFullYear() === year ? end.getDate() : (end > lastDay ? daysInMonth : 1);
      return { startDay: Math.max(1, startDay), endDay: Math.min(daysInMonth, endDay) };
    };

    const prevMonth = () => setTlMonth(p => p.month === 0 ? { year: p.year - 1, month: 11 } : { year: p.year, month: p.month - 1 });
    const nextMonth = () => setTlMonth(p => p.month === 11 ? { year: p.year + 1, month: 0 } : { year: p.year, month: p.month + 1 });
    const goToday = () => { const d = new Date(); setTlMonth({ year: d.getFullYear(), month: d.getMonth() }); };

    // Organic status colors with botanical textures and animations
    const getBarStyle = (plan) => {
      const ring = (c, s) => `radial-gradient(circle at 20% 50%, transparent ${s}px, ${c} ${s}px, ${c} ${s+1.5}px, transparent ${s+1.5}px)`;
      if (plan.status === STATUS.SEED) return { bg: 'linear-gradient(135deg, #E8E5DC 0%, #D8D4CB 100%)', border: '#C8C3BA', text: '#6B6560', fill: '#D0CBC4', anim: 'none', ringBg: ring('rgba(107,101,96,0.04)', 3) };
      if (plan.status === STATUS.SPROUTING) return { bg: 'linear-gradient(135deg, #F5E6D0 0%, #E8C9A4 100%)', border: '#D4A574', text: '#7A5C1E', fill: '#E8C9A4', anim: 'sproutGrow 4s ease-in-out infinite', ringBg: ring('rgba(139,105,20,0.05)', 5) };
      if (plan.status === STATUS.BUDDING) return { bg: 'linear-gradient(135deg, #D4DED6 0%, #A8B5AB 100%)', border: '#8A9B8E', text: '#3D5A45', fill: '#A8B5AB', anim: 'gentlePulse 3s ease-in-out infinite', ringBg: ring('rgba(138,155,142,0.05)', 7) };
      if (plan.status === STATUS.BLOOMED) return { bg: 'linear-gradient(135deg, #B8C9BC 0%, #8A9B8E 100%)', border: '#6B7F70', text: '#2A4A33', fill: '#8A9B8E', anim: 'bloomGlow 2.5s ease-in-out infinite', ringBg: ring('rgba(42,107,107,0.05)', 9) };
      return { bg: '#E8E5DC', border: '#D0CBC4', text: '#6B6560', fill: '#D0CBC4', anim: 'none', ringBg: 'none' };
    };

    // Column width based on how many days
    // MOBILE FALLBACK — card-based list view
    if (isMobile) {
      return (
        <div style={{ padding: '16px', paddingBottom: 'var(--mobile-nav)', background: 'var(--surface)', minHeight: 'calc(100vh - var(--nav-height))' }}>
          <div style={{ textAlign: 'center', marginBottom: '20px' }}>
            <h2 style={{ fontFamily: "'Instrument Serif'", fontSize: '24px', color: 'var(--charcoal)', marginBottom: '4px' }}>Growth Timeline</h2>
            <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: '0 0 12px' }}>{monthName}</p>
            <div style={{ display: 'flex', gap: '8px', justifyContent: 'center' }}>
              <button onClick={prevMonth} style={{ padding: '8px 16px', border: '1px solid var(--border)', borderRadius: 'var(--radius-full, 20px)', background: 'var(--card)', cursor: 'pointer', fontSize: '12px' }}>‹ Prev</button>
              <button onClick={goToday} style={{ padding: '8px 16px', border: 'none', borderRadius: 'var(--radius-full, 20px)', background: 'var(--teal)', color: 'white', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>Today</button>
              <button onClick={nextMonth} style={{ padding: '8px 16px', border: '1px solid var(--border)', borderRadius: 'var(--radius-full, 20px)', background: 'var(--card)', cursor: 'pointer', fontSize: '12px' }}>Next ›</button>
            </div>
          </div>
          {Object.entries(plansByObjective).map(([objName, plans]) => (
            <div key={objName} style={{ marginBottom: '20px' }}>
              <h3 style={{ fontFamily: "'Instrument Serif'", fontSize: '15px', color: 'var(--teal)', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                <StatusIcon status={plans[0]?.status || STATUS.SEED} size={16} />
                {objName}
              </h3>
              {plans.map(plan => {
                const style = getBarStyle(plan);
                return (
                  <button key={plan.id} onClick={() => setEditingPlan(plan)} style={{
                    width: '100%', padding: '14px 16px', marginBottom: '8px',
                    border: `1px solid ${style.border}`, borderRadius: '16px',
                    background: style.bg, textAlign: 'left', cursor: 'pointer'
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span style={{ fontWeight: 600, fontSize: '13px', color: style.text, display: 'flex', alignItems: 'center', gap: '6px' }}>
                        <StatusIcon status={plan.status} size={16} />
                        {plan.title || plan.name}
                      </span>
                      <span style={{ fontSize: '11px', background: 'rgba(255,255,255,0.5)', padding: '2px 8px', borderRadius: '10px', fontWeight: 600, color: style.text }}>{plan.progress}%</span>
                    </div>
                    <div style={{ fontSize: '11px', color: style.text, opacity: 0.7, marginTop: '6px' }}>
                      {new Date(plan.startDate).toLocaleDateString()} → {new Date(plan.targetDate).toLocaleDateString()}
                      {plan.owner ? ` · ${plan.owner}` : ''}
                    </div>
                    {/* Mini progress bar */}
                    <div style={{ marginTop: '8px', height: '4px', borderRadius: '2px', background: 'rgba(255,255,255,0.3)', overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: plan.progress + '%', background: style.border, borderRadius: '2px', transition: 'width 0.3s' }} />
                    </div>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      );
    }

    const colW = Math.max(36, Math.min(52, 1200 / daysInMonth));
    const sidebarW = 220;
    const rowH = 44;
    const headerH = 56;

    // Build week separators
    const weekLines = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = new Date(year, month, d).getDay();
      if (dow === 1 && d > 1) weekLines.push(d);
    }

    return (
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        minHeight: 'calc(100vh - var(--nav-height))',
        background: 'var(--surface)'
      }}
      tabIndex={0}
      role="region"
      aria-label="Growth Timeline"
      onKeyDown={(e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); prevMonth(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); nextMonth(); }
        else if (e.key === 't' || e.key === 'T') { goToday(); }
      }}
      >
        {/* HEADER */}
        <div style={{
          padding: '20px 28px',
          background: 'var(--card)',
          borderBottom: '1px solid var(--border)',
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          flexWrap: 'wrap',
          gap: '16px'
        }}>
          <div>
            <h2 style={{
              fontFamily: "'Instrument Serif'",
              fontSize: '26px',
              marginBottom: '4px',
              color: 'var(--charcoal)',
              display: 'flex',
              alignItems: 'center',
              gap: '10px'
            }}>
              <svg width="22" height="22" viewBox="0 0 48 48" fill="none" style={{ opacity: 0.7 }}>
                <path d="M24 4 C24 4 10 18 10 28 C10 36 16 42 24 42 C32 42 38 36 38 28 C38 18 24 4 24 4Z" fill="var(--sage)" opacity="0.3" />
                <path d="M24 12 L24 36" stroke="var(--teal)" strokeWidth="1.5" strokeLinecap="round" />
                <path d="M24 20 C20 17 16 18 15 21" stroke="var(--teal)" strokeWidth="1.2" strokeLinecap="round" fill="none" />
                <path d="M24 26 C28 23 32 24 33 27" stroke="var(--teal)" strokeWidth="1.2" strokeLinecap="round" fill="none" />
              </svg>
              Growth Timeline
            </h2>
            <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: 0 }}>
              {allPlans.length} plans across {Object.keys(plansByObjective).length} objectives
            </p>
          </div>
          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
            <button onClick={prevMonth} aria-label="Previous month" style={{
              width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center',
              border: '1px solid var(--border)', background: 'var(--surface)',
              borderRadius: '50%', cursor: 'pointer', fontSize: '16px', color: 'var(--text-secondary)',
              transition: 'all 0.2s'
            }}>‹</button>
            <div style={{
              minWidth: '180px', textAlign: 'center',
              fontFamily: "'Instrument Serif'", fontSize: '18px', fontWeight: 400,
              color: 'var(--charcoal)', letterSpacing: '0.02em'
            }}>{monthName}</div>
            <button onClick={nextMonth} aria-label="Next month" style={{
              width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center',
              border: '1px solid var(--border)', background: 'var(--surface)',
              borderRadius: '50%', cursor: 'pointer', fontSize: '16px', color: 'var(--text-secondary)',
              transition: 'all 0.2s'
            }}>›</button>
            <button onClick={goToday} style={{
              padding: '8px 16px', marginLeft: '8px',
              border: 'none', background: 'var(--teal)', color: 'white',
              borderRadius: 'var(--radius-full, 20px)', cursor: 'pointer',
              fontSize: '12px', fontWeight: 600, letterSpacing: '0.04em',
              transition: 'all 0.2s', textTransform: 'uppercase'
            }}>Today</button>
          </div>
        </div>

        {/* GANTT BODY */}
        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
          {/* LEFT SIDEBAR */}
          <div style={{
            width: sidebarW + 'px', minWidth: sidebarW + 'px',
            borderRight: '1px solid var(--border)',
            overflowY: 'auto', background: 'var(--card)',
            display: 'flex', flexDirection: 'column'
          }}>
            {/* Sidebar header aligned with day header */}
            <div style={{
              height: headerH + 'px', minHeight: headerH + 'px',
              padding: '0 16px',
              display: 'flex', alignItems: 'flex-end', paddingBottom: '10px',
              borderBottom: '1px solid var(--border)',
              background: 'var(--surface)'
            }}>
              <span style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                Objectives / Plans
              </span>
            </div>
            {/* Sidebar plan rows */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '0' }}>
              {Object.entries(plansByObjective).map(([objName, plans], gi) => (
                <div key={objName}>
                  {/* Objective group header */}
                  <div style={{
                    padding: '12px 16px 6px',
                    fontSize: '11px', fontWeight: 700,
                    color: 'var(--teal)', textTransform: 'uppercase',
                    letterSpacing: '0.06em',
                    borderBottom: '1px solid rgba(138,155,142,0.1)',
                    background: gi % 2 === 0 ? 'rgba(138,155,142,0.04)' : 'transparent',
                    display: 'flex', alignItems: 'center', gap: '6px'
                  }}>
                    <StatusIcon status={plans[0]?.status || STATUS.SEED} size={14} />
                    <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{objName}</span>
                    <span style={{ fontSize: '10px', color: 'var(--text-muted)', fontWeight: 400, marginLeft: 'auto' }}>{plans.length}</span>
                  </div>
                  {/* Individual plan rows */}
                  {plans.map((plan, pi) => (
                    <div
                      key={plan.id}
                      onClick={() => setEditingPlan(plan)}
                      style={{
                        height: rowH + 'px',
                        padding: '0 16px', display: 'flex', alignItems: 'center', gap: '8px',
                        cursor: 'pointer', fontSize: '12px', color: 'var(--charcoal)',
                        borderBottom: '1px solid rgba(138,155,142,0.08)',
                        background: gi % 2 === 0 ? 'rgba(138,155,142,0.02)' : 'transparent',
                        transition: 'background 0.15s'
                      }}
                      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(42,107,107,0.05)'}
                      onMouseLeave={(e) => e.currentTarget.style.background = gi % 2 === 0 ? 'rgba(138,155,142,0.02)' : 'transparent'}
                    >
                      <StatusIcon status={plan.status} size={16} />
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>
                        {plan.title || plan.name}
                      </span>
                      <span style={{ fontSize: '10px', color: 'var(--text-muted)', flexShrink: 0 }}>{plan.progress}%</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

          {/* RIGHT: GANTT CHART */}
          <div style={{ flex: 1, overflowX: 'auto', overflowY: 'auto', position: 'relative' }} ref={tlScrollRef}>
            <div style={{ minWidth: daysInMonth * colW + 'px', position: 'relative' }}>
              {/* Day column headers */}
              <div style={{
                display: 'flex', height: headerH + 'px',
                position: 'sticky', top: 0, zIndex: 15,
                background: 'var(--surface)',
                borderBottom: '1px solid var(--border)'
              }}>
                {Array.from({ length: daysInMonth }, (_, i) => {
                  const d = i + 1;
                  const dow = new Date(year, month, d).getDay();
                  const isWeekend = dow === 0 || dow === 6;
                  const isToday = d === todayDate;
                  return (
                    <div key={d} style={{
                      width: colW + 'px', minWidth: colW + 'px',
                      display: 'flex', flexDirection: 'column',
                      alignItems: 'center', justifyContent: 'flex-end',
                      paddingBottom: '6px', position: 'relative',
                      borderRight: '1px solid rgba(138,155,142,0.08)',
                      background: isToday ? 'rgba(42,107,107,0.06)' : isWeekend ? 'rgba(138,155,142,0.03)' : 'transparent'
                    }}>
                      <span style={{ fontSize: '9px', color: isWeekend ? 'rgba(138,155,142,0.5)' : 'var(--text-muted)', fontWeight: 400, marginBottom: '2px' }}>
                        {dayNames[dow]}
                      </span>
                      <span style={{
                        fontSize: '12px', fontWeight: isToday ? 700 : 500,
                        color: isToday ? 'white' : 'var(--charcoal)',
                        width: isToday ? '24px' : 'auto', height: isToday ? '24px' : 'auto',
                        borderRadius: '50%',
                        background: isToday ? 'var(--teal)' : 'transparent',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        lineHeight: 1
                      }}>
                        {d}
                      </span>
                    </div>
                  );
                })}
              </div>

              {/* Grid rows with bars */}
              <div style={{ position: 'relative' }}>
                {/* Vertical grid lines for weeks */}
                {weekLines.map(d => (
                  <div key={`wk-${d}`} style={{
                    position: 'absolute', left: (d - 1) * colW + 'px',
                    top: 0, bottom: 0, width: '1px',
                    background: 'rgba(138,155,142,0.15)', zIndex: 1, pointerEvents: 'none'
                  }} />
                ))}

                {/* Today vertical line */}
                {isCurrentMonth && todayDate > 0 && (
                  <div style={{
                    position: 'absolute',
                    left: ((todayDate - 1) * colW + colW / 2) + 'px',
                    top: 0, bottom: 0, width: '2px',
                    background: 'var(--teal)', zIndex: 10, pointerEvents: 'none',
                    opacity: 0.6
                  }}>
                    <div style={{
                      position: 'absolute', top: '-1px', left: '-3px',
                      width: '8px', height: '8px', borderRadius: '50%',
                      background: 'var(--teal)'
                    }} />
                  </div>
                )}

                {/* Plan bar rows grouped by objective */}
                {Object.entries(plansByObjective).map(([objName, plans], gi) => (
                  <div key={`bars-${objName}`}>
                    {/* Spacer for group header */}
                    <div style={{
                      height: '32px',
                      background: gi % 2 === 0 ? 'rgba(138,155,142,0.04)' : 'transparent',
                      borderBottom: '1px solid rgba(138,155,142,0.1)'
                    }} />
                    {plans.map((plan) => {
                      const { startDay, endDay } = getPlanDayRange(plan);
                      const barLeft = (startDay - 1) * colW + 4;
                      const barW = Math.max(colW - 8, (endDay - startDay + 1) * colW - 8);
                      const style = getBarStyle(plan);
                      const progressW = Math.round(barW * (plan.progress / 100));

                      return (
                        <div
                          key={plan.id}
                          style={{
                            height: rowH + 'px', position: 'relative',
                            display: 'flex', alignItems: 'center',
                            borderBottom: '1px solid rgba(138,155,142,0.08)',
                            background: gi % 2 === 0 ? 'rgba(138,155,142,0.02)' : 'transparent'
                          }}
                        >
                          {/* The bar */}
                          <button
                            onClick={() => setEditingPlan(plan)}
                            title={`${plan.title || plan.name} — ${plan.progress}% — ${plan.owner || 'Unassigned'}\n${new Date(plan.startDate).toLocaleDateString()} → ${new Date(plan.targetDate).toLocaleDateString()}`}
                            aria-label={`${plan.title || plan.name}, ${plan.progress}% complete`}
                            style={{
                              position: 'absolute', left: barLeft + 'px',
                              width: barW + 'px', height: '30px',
                              background: style.bg, backgroundImage: style.ringBg,
                              border: `1px solid ${style.border}`,
                              borderRadius: '16px', cursor: 'pointer',
                              display: 'flex', alignItems: 'center',
                              padding: '0 10px', gap: '6px',
                              overflow: 'visible', whiteSpace: 'nowrap',
                              boxShadow: '0 1px 3px rgba(0,0,0,0.06)',
                              transition: 'all 0.2s ease', zIndex: 5,
                              animation: style.anim
                            }}
                            onMouseEnter={(e) => {
                              e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,0.12)';
                              e.currentTarget.style.transform = 'translateY(-1px) scale(1.01)';
                              e.currentTarget.style.zIndex = '20';
                            }}
                            onMouseLeave={(e) => {
                              e.currentTarget.style.boxShadow = '0 1px 3px rgba(0,0,0,0.06)';
                              e.currentTarget.style.transform = 'translateY(0) scale(1)';
                              e.currentTarget.style.zIndex = '5';
                            }}
                          >
                            {/* Progress fill inside bar */}
                            <div style={{
                              position: 'absolute', left: 0, top: 0, bottom: 0,
                              width: progressW + 'px',
                              background: 'rgba(255,255,255,0.25)',
                              borderRadius: '16px 0 0 16px',
                              transition: 'width 0.3s ease'
                            }} />
                            <StatusIcon status={plan.status} size={14} />
                            <span style={{ fontSize: '11px', fontWeight: 600, color: style.text, position: 'relative', zIndex: 2, overflow: 'hidden', textOverflow: 'ellipsis' }}>
                              {plan.title || plan.name}
                            </span>
                            {barW > 120 && (
                              <span style={{ marginLeft: 'auto', fontSize: '10px', fontWeight: 500, color: style.text, opacity: 0.7, position: 'relative', zIndex: 2, flexShrink: 0 }}>
                                {plan.progress}%
                              </span>
                            )}
                            {plan.atRisk && (
                              <span style={{ position: 'relative', zIndex: 2, flexShrink: 0 }}>
                                <AtRiskOverlay size={12} />
                              </span>
                            )}
                          </button>
                          {/* Bloom marker at bar endpoint for completed plans */}
                          {plan.status === STATUS.BLOOMED && endDay <= daysInMonth && (
                            <div style={{
                              position: 'absolute',
                              left: (barLeft + barW + 2) + 'px',
                              top: '50%', transform: 'translateY(-50%)',
                              zIndex: 6, opacity: 0.6,
                              animation: 'fadeIn 0.6s ease-out 0.3s both'
                            }}>
                              <svg width="14" height="14" viewBox="0 0 48 48" fill="none">
                                {[0,1,2,3,4].map(j => {
                                  const a = (j / 5) * 360 - 90;
                                  const r = a * Math.PI / 180;
                                  return <ellipse key={j} cx={24 + Math.cos(r)*8} cy={24 + Math.sin(r)*8} rx="5" ry="8" fill="#8A9B8E" opacity="0.6" transform={`rotate(${a+90} ${24+Math.cos(r)*8} ${24+Math.sin(r)*8})`} />;
                                })}
                                <circle cx="24" cy="24" r="4" fill="#8A9B8E" opacity="0.8" />
                              </svg>
                            </div>
                          )}
                          {/* Seed marker for not-started plans */}
                          {plan.status === STATUS.SEED && startDay >= 1 && (
                            <div style={{
                              position: 'absolute',
                              left: (barLeft - 12) + 'px',
                              top: '50%', transform: 'translateY(-50%)',
                              zIndex: 6, opacity: 0.4
                            }}>
                              <svg width="10" height="10" viewBox="0 0 16 16">
                                <circle cx="8" cy="8" r="4" fill="#C8C3BA" />
                                <circle cx="8" cy="8" r="2" fill="#D8D4CB" />
                              </svg>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }


  // ============================================================
  // NAVBAR
  // ============================================================
  function renderNavbar() {
    return (<>
      <nav role="navigation" aria-label="Main navigation" style={{
        position: 'fixed',
        top: 0,
        left: 0,
        right: 0,

              style={{

                backgroundColor: currentView === 'bloom' ? 'var(--teal)' : 'transparent',

                transition: 'all var(--transition)',

              }}>
              Bloom <span style={{ fontSize: '10px', opacity: 0.7 }}>▾</span>
            </button>

            {bloomDropdown && objectives.length > 0 && (
              <div style={{
                position: 'absolute',
                top: '100%',
                left: '50%',
                transform: 'translateX(-50%)',

                backgroundColor: 'var(--card)',
                border: '1px solid var(--border)',
                borderRadius: 'var(--radius-md)',

                        cursor: 'pointer',

                      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(42,107,107,0.05)'}
                      onMouseLeave={(e) => e.currentTarget.style.background = selectedObjective && selectedObjective.id === obj.id ? 'rgba(42,107,107,0.06)' : 'transparent'}
                    >
                      <div style={{
                        width: '8px', height: '8px', borderRadius: '50%',
