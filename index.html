function calcHealth(plans) {
  if (!plans || !plans.length) return 0;
  const w = {
    [STATUS.BLOOMED]: 100,
    [STATUS.BUDDING]: 60,
    [STATUS.SPROUTING]: 30,
    [STATUS.SEED]: 0
  };
  return Math.round(plans.reduce((s, p) => s + (p.progress > 0 ? p.progress : (w[p.status] || 0)), 0) / plans.length);
}

function healthColor(h) {
  if (h >= 75) return '#D4A574';
  if (h >= 50) return '#8A9B8E';
  if (h >= 25) return '#2A6B6B';
  return '#C07A6B';
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
}

function onTrackCount(plans) {
  return plans.filter(p => !p.atRisk).length;
}

function daysRemaining(targetDate) {
  if (!targetDate) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(targetDate);
  target.setHours(0, 0, 0, 0);
  const diff = target - today;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function timeConsumedPercent(startDate, targetDate) {
  if (!startDate || !targetDate) return 0;
  const start = new Date(startDate);
  const target = new Date(targetDate);
  const today = new Date();
  const totalDuration = target - start;
  const elapsed = today - start;
  const percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
  return Math.round(percent);
}

function getBorderColor(health, atRisk) {
  if (atRisk) return '#C07A6B';
  if (health >= 75) return '#D4A574';
  if (health >= 25) return '#2A6B6B';
  return '#E8E5DC';
}

// ============================================================
// PARTICLES

function initParticles() {
  const c = document.getElementById('particle-canvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  let particles = [], af;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  if (reduced) return;
  const N = Math.min(35, Math.floor(window.innerWidth / 35));
  const cols = ['138,155,142', '42,107,107', '212,165,116'];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: 1.2 + Math.random() * 2, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
      col: cols[Math.floor(Math.random() * cols.length)], ph: Math.random() * Math.PI * 2, sp: 0.002 + Math.random() * 0.004,
    });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    const t = Date.now() * 0.001;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = c.width + 10; if (p.x > c.width + 10) p.x = -10;
      if (p.y < -10) p.y = c.height + 10; if (p.y > c.height + 10) p.y = -10;
      const o = 0.12 + 0.12 * Math.sin(t * p.sp * 100 + p.ph);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${o})`; ctx.fill();
    });
    af = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(af);
}

function BloomedIcon({ size = 48, color = '#D4A574' }) {
  const petals = 5;
  const paths = [];
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * 360 - 90;
    const rad = angle * Math.PI / 180;
    const cx = 24 + Math.cos(rad) * 11;
    const cy = 24 + Math.sin(rad) * 11;
    paths.push(
      <ellipse key={i} cx={cx} cy={cy} rx="6.5" ry="10" fill={color}
        opacity={0.8 + i * 0.04} transform={`rotate(${angle + 90} ${cx} ${cy})`} />
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" role="img" aria-label="Bloomed stage">

// ============================================================
// MODAL with FOCUS TRAP
// ============================================================
function Modal({ isOpen, title, children, onClose, footer }) {
  const modalRef = useRef(null);
  const firstFocusRef = useRef(null);

  useEffect(() => {
    if (isOpen && modalRef.current) {
      const handleKeyDown = (e) => {
        if (e.key === 'Escape') onClose();
        if (e.key === 'Tab') {
          const focusable = modalRef.current.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          );
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey) {
            if (document.activeElement === first) {
              last.focus();
              e.preventDefault();
            }
          } else {
            if (document.activeElement === last) {
              first.focus();
              e.preventDefault();
            }
          }
        }
      };
      modalRef.current.addEventListener('keydown', handleKeyDown);
      firstFocusRef.current?.focus();
      return () => modalRef.current?.removeEventListener('keydown', handleKeyDown);
    }
  }, [isOpen, onClose]);

  if (!isOpen) return null;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(0, 0, 0, 0.4)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, animation: 'fadeIn 0.2s'
    }} onClick={onClose}>
      <div ref={modalRef} style={{
        backgroundColor: 'var(--card)',
        borderRadius: 'var(--radius-lg)',
        border: '1px solid var(--border)',
        padding: '24px',
        maxWidth: '500px',
        width: '90%',
        maxHeight: '80vh',
        overflow: 'auto',
        boxShadow: 'var(--shadow-xl)',
        animation: 'scaleIn 0.3s'
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <h2 style={{ fontFamily: "'Instrument Serif'", fontSize: '20px' }}>{title}</h2>
          <button ref={firstFocusRef} onClick={onClose} style={{
            background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer',
            color: 'var(--text-muted)', padding: '8px', width: '44px', height: '44px',
            display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--radius-md)'
          }} aria-label="Close modal">×</button>
        </div>
        {children}
        {footer && <div style={{ marginTop: '24px', display: 'flex', gap: '12px', justifyContent: 'flex-end' }}>{footer}</div>}
      </div>
    </div>
  );
}

// PLAN CARD (BLOOM VIEW)
// ============================================================
function PlanCard({ plan, objective, onEdit, onDelete, onStatusChange, onProgressChange, onAtRiskToggle, onKRToggle }) {
  const statusMeta = STATUS_META[plan.status] || STATUS_META[STATUS.SEED];
  const krRatio = plan.keyResults.filter(kr => kr.completed).length;
  const krTotal = plan.keyResults.length;
  const days = daysRemaining(plan.targetDate);
  const timePercent = timeConsumedPercent(plan.startDate, plan.targetDate);
  const borderColor = getBorderColor(plan.progress, plan.atRisk);

  return (
    <div style={{
      backgroundColor: 'var(--card)',
      border: '1px solid var(--border)',
      borderRadius: 'var(--radius-lg)',
      padding: '20px',
      animation: 'fadeInUp 0.4s ease-out',
      borderLeft: `4px solid ${borderColor}`,
      position: 'relative'
    }}>
      {plan.atRisk && (
        <div style={{
          position: 'absolute', top: '12px', right: '12px',
          display: 'flex', alignItems: 'center', gap: '4px'
        }}>
          <AtRiskOverlay size={20} />
        </div>
      )}

      <div style={{ display: 'flex', gap: '12px', marginBottom: '12px', alignItems: 'flex-start' }}>
        <StatusIcon status={plan.status} size={40} />
        <div style={{ flex: 1 }}>
          <h3 style={{ fontFamily: "'Instrument Serif'", fontSize: '15px', marginBottom: '4px' }}>
            {plan.title}
          </h3>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '8px', alignItems: 'center' }}>
            <button onClick={() => onStatusChange()} style={{
              fontSize: '11px',
              backgroundColor: statusMeta.bg,
              color: statusMeta.color,
              padding: '4px 8px',
              borderRadius: 'var(--radius-sm)',
              fontWeight: 500,
              border: 'none',
              cursor: 'pointer',
              transition: 'all var(--transition)'
            }} title="Click to cycle status">
              {statusMeta.label}
            </button>
            {plan.targetDate && (
              <span style={{
                fontSize: '11px',
                backgroundColor: days <= 7 ? 'rgba(192, 122, 107, 0.1)' : 'rgba(42, 107, 107, 0.1)',
                color: days <= 7 ? 'var(--amber)' : 'var(--text-muted)',
                padding: '4px 8px',
                borderRadius: 'var(--radius-sm)',
                fontWeight: 500
              }}>
                {days > 0 ? `${days}d left` : days === 0 ? 'Due today' : 'Overdue'}
              </span>
            )}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
            <input
              type="range"
              min="0"
              max="100"
              step="5"
              value={plan.progress}
              onChange={(e) => onProgressChange(Number(e.target.value))}
              style={{ flex: 1, accentColor: 'var(--teal)', height: '6px', cursor: 'pointer' }}
              title="Drag to update progress"
            />
            <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--charcoal)', minWidth: '35px' }}>
              {plan.progress}%
            </span>
          </div>
          {plan.startDate && plan.targetDate && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
              <div style={{
                height: '4px',
                flex: 1,
                backgroundColor: 'rgba(0,0,0,0.05)',
                borderRadius: '2px',
                overflow: 'hidden'
              }}>
                <div style={{
                  height: '100%',
                  width: `${timePercent}%`,
                  background: 'rgba(200,200,200,0.6)',
                  transition: 'width 0.3s'
                }} />
              </div>
              <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{timePercent}% time</span>
            </div>
          )}
          {plan.owner && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}>
              <div style={{
                width: '24px',
                height: '24px',
                borderRadius: '50%',
                backgroundColor: 'var(--teal)',
                color: 'white',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '10px',
                fontWeight: 600
              }}>
                {initials(plan.owner)}
              </div>
              <span style={{ color: 'var(--text-secondary)' }}>{plan.owner}</span>
            </div>
          )}
        </div>
      </div>

      {plan.keyResults && plan.keyResults.length > 0 && (
        <div style={{ marginTop: '16px', paddingTop: '12px', borderTop: '1px solid var(--border)' }}>
          <div style={{ fontSize: '12px', fontWeight: 600, marginBottom: '8px', color: 'var(--charcoal)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span>Key Results ({krRatio}/{krTotal})</span>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 400 }}>
              Tip: Make KRs measurable
            </div>
          </div>
          {plan.keyResults.map((kr, i) => (
            <div key={kr.id || i} style={{
              display: 'flex',
              alignItems: 'flex-start',
              gap: '8px',
              fontSize: '13px',
              marginBottom: '6px',
              color: kr.completed ? 'var(--text-muted)' : 'var(--text-secondary)'
            }}>
              <input type="checkbox" checked={kr.completed || false} style={{ marginTop: '2px', cursor: 'pointer' }} onChange={() => onKRToggle && onKRToggle(kr.id)} />
              <span style={{ textDecoration: kr.completed ? 'line-through' : 'none' }}>
                {kr.text}
              </span>
            </div>
          ))}
        </div>
      )}

      {plan.milestones && plan.milestones.length > 0 && (
        <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-muted)' }}>
          <span style={{ fontWeight: 600 }}>
            {plan.milestones.filter(m => m.completed).length}/{plan.milestones.length}
          </span> milestones completed
        </div>
      )}

      <div style={{ display: 'flex', gap: '8px', paddingTop: '12px', borderTop: '1px solid var(--border)', marginTop: '12px' }}>
        <button onClick={() => onAtRiskToggle()} style={{
          padding: '6px 12px', fontSize: '12px', border: plan.atRisk ? 'none' : '1px solid var(--border)',
          background: plan.atRisk ? 'rgba(192, 122, 107, 0.15)' : 'var(--card)',
          borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 500,
          color: plan.atRisk ? 'var(--amber)' : 'var(--text-secondary)'
        }}>
          {plan.atRisk ? 'Remove At-Risk' : 'Mark At-Risk'}
        </button>
        <button onClick={() => onEdit()} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid var(--border)',
          background: 'var(--card)', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: 'var(--text-secondary)'
        }}>Edit</button>
        <button onClick={() => {
          if (confirm('Delete this plan?')) {
            onDelete();
          }
        }} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid #ccc',
          background: '#fff', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: '#d32f2f'
        }}>Delete</button>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [objectives, setObjectives] = useState(() => loadData() || sampleData());
  const [currentView, setCurrentView] = useState('present');
  const [bloomDropdown, setBloomDropdown] = useState(false);
  const [selectedObjective, setSelectedObjective] = useState(null);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState('');
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  const [showAddObjective, setShowAddObjective] = useState(false);
  const [showAddPlan, setShowAddPlan] = useState(false);
  const [editingObjective, setEditingObjective] = useState(null);
  const [editingPlan, setEditingPlan] = useState(null);
  const [sortBy, setSortBy] = useState('status');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterOwner, setFilterOwner] = useState('');
  const [tlMonth, setTlMonth] = useState(() => { const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; });
  const [hoveredPlan, setHoveredPlan] = useState(null);
  const [todayMarker, setTodayMarker] = useState(true);
  const tlScrollRef = useRef(null);

  useEffect(() => {
    saveData(objectives);
  }, [objectives]);

  useEffect(() => {
    const cleanup = initParticles();
    return cleanup;
  }, []);

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 767px)');
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  const getUniqueOwners = () => {
    const owners = new Set();
    objectives.forEach(obj => {
      obj.plans.forEach(plan => {
        if (plan.owner) owners.add(plan.owner);
      });
    });
    return Array.from(owners).sort();
  };

  const sortAndFilterPlans = (plans) => {
    let result = plans;

    if (filterStatus) {
      result = result.filter(p => p.status === filterStatus);
    }
    if (filterOwner) {
      result = result.filter(p => p.owner === filterOwner);
    }

    result.sort((a, b) => {
      switch(sortBy) {
        case 'progress':
          return b.progress - a.progress;
        case 'duedate':
          if (!a.targetDate && !b.targetDate) return 0;
          if (!a.targetDate) return 1;
          if (!b.targetDate) return -1;
          return new Date(a.targetDate) - new Date(b.targetDate);
        case 'owner':
          return (a.owner || '').localeCompare(b.owner || '');
        case 'status':
        default:
          const statusOrder = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];
          return statusOrder.indexOf(a.status) - statusOrder.indexOf(b.status);
      }
    });

    return result;
  };

  // ============================================================
  // RENDER GARDEN VIEW
  // ============================================================
  function renderGardenView() {
    return (
      <div style={{ position: 'relative', zIndex: 1 }}>
        <div style={{ paddingBottom: isMobile ? 'var(--mobile-nav)' : '40px' }}>
          <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '20px' }}>
            <div style={{
              marginBottom: '32px',
              textAlign: 'center',
              animation: 'fadeIn 0.6s ease-out'
            }}>
              <h1 style={{
                fontFamily: "'Instrument Serif'",
                fontSize: '36px',
                marginBottom: '8px',
                color: 'var(--charcoal)'
              }}>
                Strategic Garden
              </h1>
              <p style={{
                fontSize: '15px',
                color: 'var(--text-muted)',
                maxWidth: '600px',
                margin: '0 auto'
              }}>
                Watch your strategic initiatives grow from seed to bloom. Each objective card shows the health and status of your tactical plans.
              </p>
            </div>

            <div style={{ display: 'flex', gap: '12px', marginBottom: '24px' }}>
              <button onClick={() => setShowAddObjective(true)} style={{
                padding: '10px 16px', fontSize: '13px', border: 'none',
                background: 'var(--teal)', color: 'white', borderRadius: 'var(--radius-md)',
                cursor: 'pointer', fontWeight: 500, transition: 'all var(--transition)'
              }}>+ Add Objective</button>
            </div>

            <TractionCascade />

            <div style={{
              display: 'grid',
              gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(320px, 1fr))',
              gap: '16px',
              marginBottom: '32px'
            }}>
              {objectives.map(obj => (
                <ObjectiveCard
                  key={obj.id}
                  objective={obj}
                  onClick={() => {
                    setSelectedObjective(obj);
                    setCurrentView('bloom');
                  }}
                  onEdit={() => {
                    setEditingObjective(obj);
                  }}
                  onDelete={() => {
                    setObjectives(objectives.filter(o => o.id !== obj.id));
                  }}
                />
              ))}
            </div>

            <StatusProgression />
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // RENDER BLOOM VIEW
  // ============================================================
  function renderBloomView() {

      <div style={{ position: 'relative', zIndex: 1, paddingBottom: isMobile ? 'var(--mobile-nav)' : '40px' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '20px' }}>
          <button onClick={() => {
            setSelectedObjective(null);
            setCurrentView('garden');
          }} style={{
            background: 'none',
            border: 'none',
            color: 'var(--teal)',
            fontSize: '14px',
            cursor: 'pointer',
            padding: '8px 0',
            marginBottom: '16px',
            fontWeight: 500
          }}>
            ← Back to Garden
          </button>

          <div style={{
            backgroundColor: 'var(--card)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--radius-lg)',
            padding: '24px',
            marginBottom: '24px'
          }}>
            <h1 style={{
              fontFamily: "'Instrument Serif'",
              fontSize: '32px',
              marginBottom: '8px',
              color: 'var(--charcoal)'
            }}>
              {selectedObjective.title}
            </h1>
            {selectedObjective.description && (

                fontSize: '14px',
                color: 'var(--text-muted)',

              }}>

            <div style={{
              display: 'flex',

              color: 'var(--text-secondary)'
            }}>
              <div>Health: <strong>{calcHealth(selectedObjective.plans)}%</strong></div>

              <div>On Track: <strong>{onTrackCount(selectedObjective.plans)}</strong></div>
            </div>
          </div>

          <button onClick={() => setShowAddPlan(true)} style={{
            padding: '10px 16px', fontSize: '13px', border: 'none',
            background: 'var(--teal)', color: 'white', borderRadius: 'var(--radius-md)',
            cursor: 'pointer', fontWeight: 500, marginBottom: '16px'
          }}>+ Add Plan</button>

          <div style={{
            display: 'flex', gap: '12px', marginBottom: '16px', flexWrap: 'wrap',
            backgroundColor: 'var(--pale-bg)', padding: '12px', borderRadius: 'var(--radius-md)'
          }}>
            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{
              padding: '6px 10px', fontSize: '12px', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', background: 'var(--card)', cursor: 'pointer'
            }}>
              <option value="status">Sort by: Status</option>
              <option value="progress">Sort by: Progress</option>
              <option value="duedate">Sort by: Due Date</option>
              <option value="owner">Sort by: Owner</option>
            </select>
            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} style={{
              padding: '6px 10px', fontSize: '12px', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', background: 'var(--card)', cursor: 'pointer'
            }}>
              <option value="">All Status</option>
              <option value={STATUS.SEED}>Seed</option>
              <option value={STATUS.SPROUTING}>Sprouting</option>
              <option value={STATUS.BUDDING}>Budding</option>
              <option value={STATUS.BLOOMED}>Bloomed</option>
            </select>
            <select value={filterOwner} onChange={(e) => setFilterOwner(e.target.value)} style={{
              padding: '6px 10px', fontSize: '12px', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', background: 'var(--card)', cursor: 'pointer'
            }}>
              <option value="">All Owners</option>
              {getUniqueOwners().map(owner => (
                <option key={owner} value={owner}>{owner}</option>
              ))}
            </select>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(350px, 1fr))',
            gap: '16px'
          }}>
            {filteredPlans.map(plan => (
              <PlanCard
                key={plan.id}
                plan={plan}
                objective={selectedObjective}
                onEdit={() => {
                  setEditingPlan(plan);
                }}
                onDelete={() => {
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.filter(p => p.id !== plan.id)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.filter(p => p.id !== plan.id) }
                      : o
                  ));
                }}
                onStatusChange={() => {
                  const statuses = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];
                  const currentIdx = statuses.indexOf(plan.status);
                  const nextIdx = (currentIdx + 1) % statuses.length;
                  const updatedPlan = { ...plan, status: statuses[nextIdx] };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onProgressChange={(val) => {
                  const updatedPlan = { ...plan, progress: val };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onAtRiskToggle={() => {
                  const updatedPlan = { ...plan, atRisk: !plan.atRisk };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
                onKRToggle={(krId) => {
                  const updatedPlan = {
                    ...plan,
                    keyResults: plan.keyResults.map(kr =>
                      kr.id === krId ? { ...kr, completed: !kr.completed } : kr
                    )
                  };
                  setSelectedObjective({
                    ...selectedObjective,
                    plans: selectedObjective.plans.map(p => p.id === plan.id ? updatedPlan : p)
                  });
                  setObjectives(objectives.map(o =>
                    o.id === selectedObjective.id
                      ? { ...o, plans: o.plans.map(p => p.id === plan.id ? updatedPlan : p) }
                      : o
                  ));
                }}
              />
            ))}
          </div>
        </div>
      </div>
    );
  }

                    {health}%
                  </div>
                  <div style={{
                    fontSize: '12px',
                    color: 'var(--text-muted)',
                    marginBottom: '16px'
                  }}>
                    {onTrackCount(obj.plans)} of {obj.plans.length} plans on track
                  </div>
                </div>
              );
            })}
          </div>

          <StatusProgression />
        </div>
      </div>
    );
  }

  // ============================================================
  // RENDER TIMELINE VIEW (Gantt-style calendar)
  // ============================================================
  function renderTimelineView() {
    const scrollRef = tlScrollRef;

    const daysInMonth = new Date(tlMonth.year, tlMonth.month + 1, 0).getDate();
    const monthName = new Date(tlMonth.year, tlMonth.month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === tlMonth.year && today.getMonth() === tlMonth.month;
    const todayDay = today.getDate();

    const DAY_W = isMobile ? 36 : 42;
    const LABEL_W = isMobile ? 150 : 220;
    const ROW_H = 38;
    const GROUP_HEADER_H = 36;

    const prevMonth = () => {
      setTlMonth(p => p.month === 0 ? { year: p.year - 1, month: 11 } : { year: p.year, month: p.month - 1 });
    };
    const nextMonth = () => {
      setTlMonth(p => p.month === 11 ? { year: p.year + 1, month: 0 } : { year: p.year, month: p.month + 1 });
    };
    const goToday = () => {
      const d = new Date();
      setTlMonth({ year: d.getFullYear(), month: d.getMonth() });
    };

    // Calculate bar position for a plan within the current month view
    function planBar(plan) {
      if (!plan.startDate && !plan.targetDate) return null;
      const monthStart = new Date(tlMonth.year, tlMonth.month, 1);
      const monthEnd = new Date(tlMonth.year, tlMonth.month + 1, 0, 23, 59, 59);
      const pStart = plan.startDate ? new Date(plan.startDate) : new Date(plan.targetDate);
      const pEnd = plan.targetDate ? new Date(plan.targetDate) : new Date(plan.startDate);
      // Check if plan overlaps this month at all
      if (pEnd < monthStart || pStart > monthEnd) return null;
      const clampedStart = pStart < monthStart ? 1 : pStart.getDate();
      const clampedEnd = pEnd > monthEnd ? daysInMonth : pEnd.getDate();
      return { start: clampedStart, end: clampedEnd, extendsLeft: pStart < monthStart, extendsRight: pEnd > monthEnd };
    }

    // Status icon for plan bars
    function statusIcon(status) {
      if (status === STATUS.SEED) return '●';
      if (status === STATUS.SPROUTING) return '◐';
      if (status === STATUS.BUDDING) return '◑';
      if (status === STATUS.BLOOMED) return '✦';
      return '●';
    }

    // Filter objectives that have at least one plan visible this month
    const visibleObjectives = objectives.map(obj => {
      const visPlans = obj.plans.filter(p => planBar(p) !== null);
      return { ...obj, visiblePlans: visPlans };
    }).filter(obj => obj.visiblePlans.length > 0 || obj.plans.length > 0);

    // Ref callback to scroll to today
    const scrollToToday = (node) => {
      if (node && isCurrentMonth) {
        setTimeout(() => { node.scrollLeft = Math.max(0, (todayDay - 3) * DAY_W); }, 50);
      }
    };

    return (
      <div style={{ position: 'relative', zIndex: 1, paddingBottom: isMobile ? 'var(--mobile-nav)' : '40px' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto', padding: isMobile ? '12px 8px' : '20px' }}>

          {/* Header */}
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: '20px', flexWrap: 'wrap', gap: '12px'
          }}>
            <h1 style={{
              fontFamily: "'Instrument Serif'", fontSize: isMobile ? '24px' : '28px',
              color: 'var(--charcoal)', margin: 0, letterSpacing: '0.04em', textTransform: 'uppercase'
            }}>
              App Timeline
            </h1>

            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <button onClick={goToday} style={{
                padding: '6px 12px', fontSize: '12px', fontWeight: 600,
                background: 'var(--teal)', color: 'white', border: 'none',
                borderRadius: 'var(--radius-sm)', cursor: 'pointer'
              }}>Today</button>
              <button onClick={prevMonth} aria-label="Previous month" style={{
                width: '32px', height: '32px', border: '1px solid var(--border)',
                borderRadius: 'var(--radius-sm)', background: 'var(--card)',
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '14px', color: 'var(--text-secondary)'
              }}>‹</button>
              <div style={{
                padding: '6px 16px', fontSize: '14px', fontWeight: 600,
                border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)',
                background: 'var(--card)', color: 'var(--charcoal)', minWidth: '160px',
                textAlign: 'center', display: 'flex', alignItems: 'center', gap: '8px', justifyContent: 'center'
              }}>
                <span>📅</span> {monthName}
              </div>
              <button onClick={nextMonth} aria-label="Next month" style={{
                width: '32px', height: '32px', border: '1px solid var(--border)',
                borderRadius: 'var(--radius-sm)', background: 'var(--card)',
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '14px', color: 'var(--text-secondary)'
              }}>›</button>
            </div>
          </div>

          {/* Gantt chart container */}
          <div style={{
            backgroundColor: 'var(--card)', border: '1px solid var(--border)',
            borderRadius: 'var(--radius-lg)', overflow: 'hidden',
            boxShadow: 'var(--shadow-md)', animation: 'fadeIn 0.4s ease-out'
          }}>
            <div style={{ display: 'flex' }}>

              {/* Fixed left label column */}
              <div style={{ minWidth: LABEL_W, maxWidth: LABEL_W, borderRight: '2px solid var(--border)', flexShrink: 0, zIndex: 2 }}>
                {/* Day header spacer */}
                <div style={{ height: '44px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 12px' }}>
                  <span style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                    Objectives / Plans
                  </span>
                </div>

                {/* Rows for each objective group */}
                {visibleObjectives.map((obj, oIdx) => (
                  <div key={obj.id}>
                    {/* Objective group header */}
                    <div style={{
                      height: GROUP_HEADER_H, display: 'flex', alignItems: 'center', padding: '0 12px',
                      backgroundColor: 'var(--pale-green)', borderBottom: '1px solid var(--border)',
                      borderTop: oIdx > 0 ? '1px solid var(--border-dark)' : 'none'
                    }}>
                      <span style={{
                        fontSize: '11px', fontWeight: 700, color: 'var(--teal-dark)',
                        textTransform: 'uppercase', letterSpacing: '0.06em',
                        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'
                      }}>
                        {obj.title} &nbsp;|&nbsp; {obj.plans.length} {obj.plans.length === 1 ? 'plan' : 'plans'}
                      </span>
                    </div>

                    {/* Plan rows */}
                    {obj.plans.map((plan, pIdx) => {
                      const bar = planBar(plan);
                      const meta = STATUS_META[plan.status];
                      return (
                        <div key={plan.id} style={{
                          height: ROW_H, display: 'flex', alignItems: 'center', padding: '0 12px',
                          borderBottom: '1px solid var(--border)',
                          backgroundColor: hoveredPlan === plan.id ? 'rgba(42,107,107,0.03)' : 'transparent',
                          transition: 'background 0.15s'
                        }}
                        onMouseEnter={() => setHoveredPlan(plan.id)}
                        onMouseLeave={() => setHoveredPlan(null)}
                        >
                          <span style={{
                            fontSize: '12px', marginRight: '6px',
                            color: meta.color
                          }}>{statusIcon(plan.status)}</span>
                          <span style={{
                            fontSize: '12px', fontWeight: 500, color: 'var(--charcoal)',
                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1
                          }} title={plan.title}>
                            {plan.title}
                          </span>
                          {plan.atRisk && <span style={{ fontSize: '10px', color: 'var(--amber)', marginLeft: '4px' }} title="At Risk">⚠</span>}
                        </div>
                      );
                    })}

                    {/* + Add row */}
                    {obj.plans.length < MAX_PLANS && (
                      <div style={{
                        height: ROW_H - 4, display: 'flex', alignItems: 'center', padding: '0 12px',
                        borderBottom: '1px solid var(--border)', cursor: 'pointer'
                      }}
                      onClick={() => {
                        const found = objectives.find(o => o.id === obj.id);
                        if (found) { setSelectedObjective(found); setShowAddPlan(true); }
                      }}
                      >
                        <span style={{ fontSize: '12px', color: 'var(--text-muted)', fontWeight: 500 }}>+ Add</span>
                      </div>
                    )}
                  </div>
                ))}

                {/* Empty state */}
                {visibleObjectives.length === 0 && (
                  <div style={{ padding: '40px 16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                    No objectives yet. Add one from the Garden view.
                  </div>
                )}
              </div>

              {/* Scrollable day columns + bars */}
              <div ref={scrollToToday} style={{ flex: 1, overflowX: 'auto', overflowY: 'hidden' }}>
                <div style={{ minWidth: days.length * DAY_W, position: 'relative' }}>

                  {/* Day number header row */}
                  <div style={{ display: 'flex', height: '44px', borderBottom: '1px solid var(--border)', position: 'sticky', top: 0, zIndex: 1, backgroundColor: 'var(--card)' }}>
                    {days.map(d => {
                      const dow = new Date(tlMonth.year, tlMonth.month, d).getDay();
                      const isWeekend = dow === 0 || dow === 6;
                      const isToday = isCurrentMonth && d === todayDay;
                      return (
                        <div key={d} style={{
                          width: DAY_W, minWidth: DAY_W, display: 'flex', flexDirection: 'column',
                          alignItems: 'center', justifyContent: 'center',
                          borderRight: '1px solid rgba(0,0,0,0.04)',
                          backgroundColor: isToday ? 'rgba(42,107,107,0.08)' : isWeekend ? 'rgba(0,0,0,0.015)' : 'transparent'
                        }}>
                          <span style={{
                            fontSize: '13px', fontWeight: isToday ? 700 : 500,
                            color: isToday ? 'var(--teal)' : 'var(--text-secondary)'
                          }}>{d}</span>
                          <span style={{
                            fontSize: '9px', color: isToday ? 'var(--teal)' : 'var(--text-muted)',
                            fontWeight: isToday ? 600 : 400
                          }}>
                            {['Su','Mo','Tu','We','Th','Fr','Sa'][dow]}
                          </span>
                        </div>
                      );
                    })}
                  </div>

                  {/* Rows matching the left column */}
                  {visibleObjectives.map((obj, oIdx) => (
                    <div key={obj.id}>
                      {/* Objective group header row (empty in the chart area) */}
                      <div style={{
                        height: GROUP_HEADER_H, position: 'relative',
                        backgroundColor: 'var(--pale-green)', borderBottom: '1px solid var(--border)',
                        borderTop: oIdx > 0 ? '1px solid var(--border-dark)' : 'none',
                        display: 'flex'
                      }}>
                        {days.map(d => (
                          <div key={d} style={{
                            width: DAY_W, minWidth: DAY_W, borderRight: '1px solid rgba(0,0,0,0.03)'
                          }} />
                        ))}
                      </div>

                      {/* Plan bar rows */}
                      {obj.plans.map(plan => {
                        const bar = planBar(plan);
                        const meta = STATUS_META[plan.status];
                        return (
                          <div key={plan.id} style={{
                            height: ROW_H, position: 'relative', display: 'flex',
                            borderBottom: '1px solid var(--border)',
                            backgroundColor: hoveredPlan === plan.id ? 'rgba(42,107,107,0.03)' : 'transparent',
                            transition: 'background 0.15s'
                          }}
                          onMouseEnter={() => setHoveredPlan(plan.id)}
                          onMouseLeave={() => setHoveredPlan(null)}
                          >
                            {/* Grid lines */}
                            {days.map(d => {
                              const dow = new Date(tlMonth.year, tlMonth.month, d).getDay();
                              const isWeekend = dow === 0 || dow === 6;
                              return (
                                <div key={d} style={{
                                  width: DAY_W, minWidth: DAY_W,
                                  borderRight: '1px solid rgba(0,0,0,0.04)',
                                  backgroundColor: isWeekend ? 'rgba(0,0,0,0.01)' : 'transparent'
                                }} />
                              );
                            })}

                            {/* Plan bar overlay */}
                            {bar && (
                              <div
                                title={`${plan.title}\n${plan.owner || 'Unassigned'}\n${meta.label} — ${plan.progress}%`}
                                style={{
                                  position: 'absolute',
                                  top: '6px',
                                  left: (bar.start - 1) * DAY_W + 4,
                                  width: (bar.end - bar.start + 1) * DAY_W - 8,
                                  height: ROW_H - 12,
                                  backgroundColor: plan.atRisk ? 'var(--amber)' : meta.color,
                                  opacity: plan.status === STATUS.BLOOMED ? 0.85 : 0.7,
                                  borderRadius: `${bar.extendsLeft ? '0' : '6'}px ${bar.extendsRight ? '0' : '6'}px ${bar.extendsRight ? '0' : '6'}px ${bar.extendsLeft ? '0' : '6'}px`,
                                  display: 'flex', alignItems: 'center', padding: '0 8px',
                                  overflow: 'hidden', cursor: 'pointer',
                                  transition: 'opacity 0.2s, transform 0.15s',
                                  transform: hoveredPlan === plan.id ? 'scaleY(1.08)' : 'scaleY(1)',
                                  boxShadow: hoveredPlan === plan.id ? '0 2px 8px rgba(0,0,0,0.15)' : 'none'
                                }}
                              >
                                <span style={{
                                  fontSize: '11px', fontWeight: 600, color: 'white',
                                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                                  textShadow: '0 1px 2px rgba(0,0,0,0.2)'
                                }}>
                                  {(bar.end - bar.start + 1) * DAY_W > 80 ? plan.title : ''}
                                </span>

                                {/* Progress indicator */}
                                {plan.progress > 0 && (
                                  <div style={{
                                    position: 'absolute', bottom: 0, left: 0,
                                    height: '3px', width: `${plan.progress}%`,
                                    backgroundColor: 'rgba(255,255,255,0.5)',
                                    borderRadius: '0 2px 0 0'
                                  }} />
                                )}
                              </div>
                            )}

                            {/* Today marker line */}
                            {isCurrentMonth && todayMarker && (
                              <div style={{
                                position: 'absolute', top: 0, bottom: 0,
                                left: (todayDay - 1) * DAY_W + DAY_W / 2,
                                width: '2px', backgroundColor: 'var(--teal)',
                                opacity: 0.3, pointerEvents: 'none'
                              }} />
                            )}
                          </div>
                        );
                      })}

                      {/* + Add row spacer */}
                      {obj.plans.length < MAX_PLANS && (
                        <div style={{ height: ROW_H - 4, borderBottom: '1px solid var(--border)', display: 'flex' }}>
                          {days.map(d => (
                            <div key={d} style={{ width: DAY_W, minWidth: DAY_W, borderRight: '1px solid rgba(0,0,0,0.04)' }} />
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Legend */}
          <div style={{
            display: 'flex', flexWrap: 'wrap', gap: '16px', marginTop: '16px',
            justifyContent: 'center', padding: '8px 0'
          }}>
            {Object.entries(STATUS_META).map(([key, meta]) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                <div style={{
                  width: '20px', height: '10px', borderRadius: '3px',
                  backgroundColor: meta.color, opacity: 0.7
                }} />
                <span style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 500 }}>
                  {meta.label}
                </span>
              </div>
            ))}
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              <div style={{ width: '20px', height: '10px', borderRadius: '3px', backgroundColor: 'var(--amber)', opacity: 0.7 }} />
              <span style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 500 }}>At Risk</span>
            </div>
          </div>

          {/* Drag hint */}
          <div style={{
            textAlign: 'center', marginTop: '8px', fontSize: '12px',
            color: 'var(--text-muted)', fontStyle: 'italic'
          }}>
            Scroll horizontally to see more days • Click bars for details
          </div>
        </div>
      </div>
    );
  }

  // NAVBAR
  // ============================================================

              }}>

              style={{

                borderRadius: 'var(--radius-md)',

                        alignItems: 'center',

                        width: '100%',

                      }}

  // ============================================================
  // MOBILE NAV
  // ============================================================

      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,

          { id: 'present', label: 'Overview', icon: '📊' },
          { id: 'garden', label: 'Garden', icon: '🌿' },
          { id: 'timeline', label: 'Timeline', icon: '📅' },
          { id: 'bloom', label: 'Bloom', icon: '🌸' }
        ].map(t => (
          <button key={t.id} onClick={() => {
            setCurrentView(t.id);
            if (t.id !== 'bloom') setSelectedObjective(null);
          }} style={{
            flex: 1,
            background: 'none',
            border: 'none',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '4px',
            color: currentView === t.id ? 'var(--teal)' : 'var(--text-muted)',

            padding: '8px',
            transition: 'color var(--transition)'
          }}>
            <span style={{ fontSize: '20px' }}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    );
  }

  // ============================================================
  // RENDER
  // ============================================================
  const currentContent = selectedObjective && currentView === 'bloom'
    ? renderBloomView()
    : currentView === 'present'
      ? renderPresentView()
      : currentView === 'timeline'
        ? renderTimelineView()
        : renderGardenView();

  return (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      minHeight: '100vh',
      backgroundColor: 'var(--surface)'
    }}>
      {renderNavbar()}
      <main style={{
        flex: 1,
        marginTop: isMobile ? 0 : 'var(--nav-height)',
        paddingTop: isMobile ? '12px' : '20px'
      }}>
        {currentContent}
      </main>
      {renderMobileNav()}

      <AddObjectiveModal
        isOpen={showAddObjective}
        onClose={() => setShowAddObjective(false)}
        onAdd={({ title, description, traction }) => {
          const newObj = createObjective(title, description, traction);
          setObjectives([...objectives, newObj]);
        }}
      />

      <AddPlanModal
        isOpen={showAddPlan}
        onClose={() => setShowAddPlan(false)}
        onAdd={({ title, owner, targetDate, startDate }) => {
          if (selectedObjective) {
            const newPlan = createPlan(title, STATUS.SEED, owner, 0, targetDate, startDate);
            const updated = {
              ...selectedObjective,
              plans: [...selectedObjective.plans, newPlan]
            };
            setSelectedObjective(updated);
            setObjectives(objectives.map(o => o.id === selectedObjective.id ? updated : o));
          }
        }}
      />

      <EditObjectiveModal
        isOpen={!!editingObjective}
        onClose={() => setEditingObjective(null)}
        objective={editingObjective}
        onSave={(updatedObj) => {
          setObjectives(objectives.map(o => o.id === updatedObj.id ? updatedObj : o));
          if (selectedObjective && selectedObjective.id === updatedObj.id) {
            setSelectedObjective(updatedObj);
          }
          setEditingObjective(null);
        }}
      />

      <EditPlanModal
        isOpen={!!editingPlan}
        onClose={() => setEditingPlan(null)}
        plan={editingPlan}
        onSave={(updatedPlan) => {
          const updatePlanInObjectives = (objs) => objs.map(obj => ({
            ...obj,
            plans: obj.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
          }));
          setObjectives(updatePlanInObjectives(objectives));
          if (selectedObjective) {
            setSelectedObjective({
              ...selectedObjective,
              plans: selectedObjective.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
            });
          }
          setEditingPlan(null);
        }}
      />

      <Modal
        isOpen={showImportModal}
        title="Import Strategic Plan"
        onClose={() => {
          setShowImportModal(false);
          setImportText('');
        }}
        footer={
          <>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: '1px solid var(--border)',
              background: 'var(--card)',
              color: 'var(--charcoal)',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Cancel
            </button>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: 'none',
              background: 'var(--teal)',
              color: 'white',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Parse & Import
            </button>
          </>
        }
      >
        <textarea
          placeholder="Paste your strategic plan document here..."
          value={importText}
          onChange={(e) => setImportText(e.target.value)}
          style={{
            width: '100%',
            height: '200px',
            padding: '12px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--border)',
            fontFamily: 'monospace',
            fontSize: '12px',
            color: 'var(--charcoal)',
            resize: 'none',
            marginBottom: '12px'
          }}
        />
        <p style={{ fontSize: '12px', color: 'var(--text-muted)', margin: 0 }}>
          The app will parse headers, numbered lists, and bullet points to extract objectives and tactical plans.
        </p>
      </Modal>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
