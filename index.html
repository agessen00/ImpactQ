function calcHealth(plans) {
  if (!plans || !plans.length) return 0;
  const w = {
    [STATUS.BLOOMED]: 100,
    [STATUS.BUDDING]: 60,
    [STATUS.SPROUTING]: 30,
    [STATUS.SEED]: 0
  };
  return Math.round(plans.reduce((s, p) => s + (p.progress > 0 ? p.progress : (w[p.status] || 0)), 0) / plans.length);
}

function healthColor(h) {
  if (h >= 75) return '#D4A574';
  if (h >= 50) return '#8A9B8E';
  if (h >= 25) return '#2A6B6B';
  return '#C07A6B';
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
}

function onTrackCount(plans) {
  return plans.filter(p => !p.atRisk).length;
}

function daysRemaining(targetDate) {
  if (!targetDate) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(targetDate);
  target.setHours(0, 0, 0, 0);
  const diff = target - today;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function timeConsumedPercent(startDate, targetDate) {
  if (!startDate || !targetDate) return 0;
  const start = new Date(startDate);
  const target = new Date(targetDate);
  const today = new Date();
  const totalDuration = target - start;
  const elapsed = today - start;
  const percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
  return Math.round(percent);
}

function getBorderColor(health, atRisk) {
  if (atRisk) return '#C07A6B';
  if (health >= 75) return '#D4A574';
  if (health >= 25) return '#2A6B6B';
  return '#E8E5DC';
}

// ============================================================
// PARTICLES

function initParticles() {
  const c = document.getElementById('particle-canvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  let particles = [], af;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  if (reduced) return;
  const N = Math.min(35, Math.floor(window.innerWidth / 35));
  const cols = ['138,155,142', '42,107,107', '212,165,116'];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: 1.2 + Math.random() * 2, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
      col: cols[Math.floor(Math.random() * cols.length)], ph: Math.random() * Math.PI * 2, sp: 0.002 + Math.random() * 0.004,
    });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    const t = Date.now() * 0.001;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = c.width + 10; if (p.x > c.width + 10) p.x = -10;
      if (p.y < -10) p.y = c.height + 10; if (p.y > c.height + 10) p.y = -10;
      const o = 0.12 + 0.12 * Math.sin(t * p.sp * 100 + p.ph);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${o})`; ctx.fill();
    });
    af = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(af);
}

function BloomedIcon({ size = 48, color = '#D4A574' }) {
  const petals = 5;
  const paths = [];
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * 360 - 90;
    const rad = angle * Math.PI / 180;
    const cx = 24 + Math.cos(rad) * 11;
    const cy = 24 + Math.sin(rad) * 11;
    paths.push(
      <ellipse key={i} cx={cx} cy={cy} rx="6.5" ry="10" fill={color}
        opacity={0.8 + i * 0.04} transform={`rotate(${angle + 90} ${cx} ${cy})`} />
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" role="img" aria-label="Bloomed stage">

// ============================================================
// MODAL with FOCUS TRAP
// ============================================================
function Modal({ isOpen, title, children, onClose, footer }) {
  const modalRef = useRef(null);
  const firstFocusRef = useRef(null);

  useEffect(() => {
    if (isOpen && modalRef.current) {
      const handleKeyDown = (e) => {
        if (e.key === 'Escape') onClose();
        if (e.key === 'Tab') {
          const focusable = modalRef.current.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          );
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey) {
            if (document.activeElement === first) {
              last.focus();
              e.preventDefault();
            }
          } else {
            if (document.activeElement === last) {
              first.focus();
              e.preventDefault();
            }
          }
        }
      };
      modalRef.current.addEventListener('keydown', handleKeyDown);
      firstFocusRef.current?.focus();
      return () => modalRef.current?.removeEventListener('keydown', handleKeyDown);
    }
  }, [isOpen, onClose]);

  if (!isOpen) return null;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(0, 0, 0, 0.4)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, animation: 'fadeIn 0.2s'
    }} onClick={onClose}>
      <div ref={modalRef} style={{
        backgroundColor: 'var(--card)',
        borderRadius: 'var(--radius-lg)',
        border: '1px solid var(--border)',
        padding: '24px',
        maxWidth: '500px',
        width: '90%',
        maxHeight: '80vh',
        overflow: 'auto',
        boxShadow: 'var(--shadow-xl)',
        animation: 'scaleIn 0.3s'
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <h2 style={{ fontFamily: "'Instrument Serif'", fontSize: '20px' }}>{title}</h2>
          <button ref={firstFocusRef} onClick={onClose} style={{
            background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer',
            color: 'var(--text-muted)', padding: '8px', width: '44px', height: '44px',
            display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--radius-md)'
          }} aria-label="Close modal">×</button>
        </div>
        {children}
        {footer && <div style={{ marginTop: '24px', display: 'flex', gap: '12px', justifyContent: 'flex-end' }}>{footer}</div>}
      </div>
    </div>
  );
}

  );

// PLAN CARD (BLOOM VIEW)
// ============================================================
function PlanCard({ plan, objective, onEdit, onDelete, onStatusChange, onProgressChange, onAtRiskToggle, onKRToggle }) {
  const statusMeta = STATUS_META[plan.status] || STATUS_META[STATUS.SEED];
  const krRatio = plan.keyResults.filter(kr => kr.completed).length;
  const krTotal = plan.keyResults.length;
  const days = daysRemaining(plan.targetDate);
  const timePercent = timeConsumedPercent(plan.startDate, plan.targetDate);
  const borderColor = getBorderColor(plan.progress, plan.atRisk);

  return (
    <div style={{
      backgroundColor: 'var(--card)',
      border: '1px solid var(--border)',
      borderRadius: 'var(--radius-lg)',
      padding: '20px',
      animation: 'fadeInUp 0.4s ease-out',
      borderLeft: `4px solid ${borderColor}`,
      position: 'relative'
    }}>
      {plan.atRisk && (
        <div style={{
          position: 'absolute', top: '12px', right: '12px',
          display: 'flex', alignItems: 'center', gap: '4px'
        }}>
          <AtRiskOverlay size={20} />
        </div>
      )}

      <div style={{ display: 'flex', gap: '12px', marginBottom: '12px', alignItems: 'flex-start' }}>
        <StatusIcon status={plan.status} size={40} />
        <div style={{ flex: 1 }}>
          <h3 style={{ fontFamily: "'Instrument Serif'", fontSize: '15px', marginBottom: '4px' }}>
            {plan.title}
          </h3>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '8px', alignItems: 'center' }}>
            <button onClick={() => onStatusChange()} style={{
              fontSize: '11px',
              backgroundColor: statusMeta.bg,
              color: statusMeta.color,
              padding: '4px 8px',
              borderRadius: 'var(--radius-sm)',
              fontWeight: 500,
              border: 'none',
              cursor: 'pointer',
              transition: 'all var(--transition)'
            }} title="Click to cycle status">
              {statusMeta.label}
            </button>
            {plan.targetDate && (
              <span style={{
                fontSize: '11px',
                backgroundColor: days <= 7 ? 'rgba(192, 122, 107, 0.1)' : 'rgba(42, 107, 107, 0.1)',
                color: days <= 7 ? 'var(--amber)' : 'var(--text-muted)',
                padding: '4px 8px',
                borderRadius: 'var(--radius-sm)',
                fontWeight: 500
              }}>
                {days > 0 ? `${days}d left` : days === 0 ? 'Due today' : 'Overdue'}
              </span>
            )}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
            <input
              type="range"
              min="0"
              max="100"
              step="5"
              value={plan.progress}
              onChange={(e) => onProgressChange(Number(e.target.value))}
              style={{ flex: 1, accentColor: 'var(--teal)', height: '6px', cursor: 'pointer' }}
              title="Drag to update progress"
            />
            <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--charcoal)', minWidth: '35px' }}>
              {plan.progress}%
            </span>
          </div>
          {plan.startDate && plan.targetDate && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
              <div style={{
                height: '4px',
                flex: 1,
                backgroundColor: 'rgba(0,0,0,0.05)',
                borderRadius: '2px',
                overflow: 'hidden'
              }}>
                <div style={{
                  height: '100%',
                  width: `${timePercent}%`,
                  background: 'rgba(200,200,200,0.6)',
                  transition: 'width 0.3s'
                }} />
              </div>
              <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{timePercent}% time</span>
            </div>
          )}
          {plan.owner && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}>
              <div style={{
                width: '24px',
                height: '24px',
                borderRadius: '50%',
                backgroundColor: 'var(--teal)',
                color: 'white',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '10px',
                fontWeight: 600
              }}>
                {initials(plan.owner)}
              </div>
              <span style={{ color: 'var(--text-secondary)' }}>{plan.owner}</span>
            </div>
          )}
        </div>
      </div>

      {plan.keyResults && plan.keyResults.length > 0 && (
        <div style={{ marginTop: '16px', paddingTop: '12px', borderTop: '1px solid var(--border)' }}>
          <div style={{ fontSize: '12px', fontWeight: 600, marginBottom: '8px', color: 'var(--charcoal)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span>Key Results ({krRatio}/{krTotal})</span>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 400 }}>

          </div>
          {plan.keyResults.map((kr, i) => (

              alignItems: 'flex-start',

              <span style={{ textDecoration: kr.completed ? 'line-through' : 'none' }}>
                {kr.text}
              </span>
            </div>

      {plan.milestones && plan.milestones.length > 0 && (
        <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-muted)' }}>
          <span style={{ fontWeight: 600 }}>

      <div style={{ display: 'flex', gap: '8px', paddingTop: '12px', borderTop: '1px solid var(--border)', marginTop: '12px' }}>

          background: plan.atRisk ? 'rgba(192, 122, 107, 0.15)' : 'var(--card)',
          borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 500,
          color: plan.atRisk ? 'var(--amber)' : 'var(--text-secondary)'
        }}>
          {plan.atRisk ? 'Remove At-Risk' : 'Mark At-Risk'}
        </button>
        <button onClick={() => onEdit()} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid var(--border)',
          background: 'var(--card)', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: 'var(--text-secondary)'
        }}>Edit</button>
        <button onClick={() => {
          if (confirm('Delete this plan?')) {
            onDelete();
          }
        }} style={{
          padding: '6px 12px', fontSize: '12px', border: '1px solid #ccc',
          background: '#fff', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer', fontWeight: 500, color: '#d32f2f'
        }}>Delete</button>
      </div>
    </div>
  );
}

// ============================================================
// LOADING OVERLAY COMPONENT
// ============================================================
function LoadingOverlay({ isLoading }) {
  const [stage, setStage] = useState(0);

  useEffect(() => {
    if (!isLoading) return;
    const interval = setInterval(() => {
      setStage(s => (s + 1) % 4);
    }, 300);
    return () => clearInterval(interval);
  }, [isLoading]);

  if (!isLoading) return null;

  const stages = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];

  const progressPercent = Math.min(80 + stage * 5, 95);

  return (
    <div role="status" aria-live="polite" aria-label="Loading application" style={{
      position: 'fixed',
      top: 0,
      left: 0,
      right: 0,
      bottom: 0,
      background: 'var(--surface)',
      opacity: 0.95,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: 8888,
      backdropFilter: 'blur(2px)'
    }}>
      <div style={{ animation: 'seedPulse 2s ease-in-out infinite' }} aria-hidden="true">
        <StatusIcon status={stages[stage]} size={80} />
      </div>
      <div style={{
        marginTop: '32px',
        fontSize: '16px',
        fontWeight: 600,
        color: 'var(--charcoal)',
        letterSpacing: '0.5px'
      }}>
        Growing your insights...
      </div>
      <div style={{
        marginTop: '16px',
        height: '4px',
        width: '120px',
        background: 'var(--border)',
        borderRadius: '2px',
        overflow: 'hidden'
      }} role="progressbar" aria-valuenow={progressPercent} aria-valuemin="0" aria-valuemax="100">
        <div style={{
          height: '100%',
          background: 'linear-gradient(90deg, var(--teal), var(--sage))',
          transition: 'width 0.4s ease-in-out',
          width: `${progressPercent}%`
        }} />
      </div>
      <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-muted)' }}>
        {progressPercent}%
      </div>
    </div>
  );
}

}

  const [sortBy, setSortBy] = useState('status');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterOwner, setFilterOwner] = useState('');
  const [tlMonth, setTlMonth] = useState(() => { const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; });
  const [hoveredPlan, setHoveredPlan] = useState(null);
  const [todayMarker, setTodayMarker] = useState(true);

  useEffect(() => {
    saveData(objectives);
  }, [objectives]);

  useEffect(() => {
    const cleanup = initParticles();
    return cleanup;
  }, []);

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 767px)');
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  const getUniqueOwners = () => {
    const owners = new Set();
    objectives.forEach(obj => {
      obj.plans.forEach(plan => {
        if (plan.owner) owners.add(plan.owner);
      });
    });
    return Array.from(owners).sort();
  };

  const sortAndFilterPlans = (plans) => {
    let result = plans;

    if (filterStatus) {
      result = result.filter(p => p.status === filterStatus);
    }
    if (filterOwner) {
      result = result.filter(p => p.owner === filterOwner);
    }

    result.sort((a, b) => {
      switch(sortBy) {
        case 'progress':
          return b.progress - a.progress;
        case 'duedate':
          if (!a.targetDate && !b.targetDate) return 0;
          if (!a.targetDate) return 1;
          if (!b.targetDate) return -1;
          return new Date(a.targetDate) - new Date(b.targetDate);
        case 'owner':
          return (a.owner || '').localeCompare(b.owner || '');
        case 'status':
        default:
          const statusOrder = [STATUS.SEED, STATUS.SPROUTING, STATUS.BUDDING, STATUS.BLOOMED];
          return statusOrder.indexOf(a.status) - statusOrder.indexOf(b.status);
      }
    });

    return result;
  };

  function renderTimelineView() {
    // Get all plans grouped and sorted
    const allPlans = [];
    objectives.forEach(obj => {
      obj.plans.forEach(plan => {
        allPlans.push({ ...plan, objectiveName: obj.name, objectiveId: obj.id });
      });
    });

    // Get calendar info
    const year = tlMonth.year;
    const month = tlMonth.month;
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
    const todayDate = isCurrentMonth ? today.getDate() : -1;

    // Group plans by objective
    const plansByObjective = {};
    allPlans.forEach(plan => {
      if (!plansByObjective[plan.objectiveName]) {
        plansByObjective[plan.objectiveName] = [];
      }
      plansByObjective[plan.objectiveName].push(plan);
    });

    // Calculate day range for each plan
    const getPlanDayRange = (plan) => {
      const start = new Date(plan.startDate);
      const end = new Date(plan.targetDate);
      const startDay = start.getMonth() === month && start.getFullYear() === year ? start.getDate() : (start < firstDay ? 1 : daysInMonth);
      const endDay = end.getMonth() === month && end.getFullYear() === year ? end.getDate() : (end > lastDay ? daysInMonth : 1);
      return { startDay: Math.max(1, startDay), endDay: Math.min(daysInMonth, endDay) };
    };

    // Prev/next month handlers
    const prevMonth = () => {
      setTlMonth(p => p.month === 0 ? { year: p.year - 1, month: 11 } : { year: p.year, month: p.month - 1 });
    };
    const nextMonth = () => {
      setTlMonth(p => p.month === 11 ? { year: p.year + 1, month: 0 } : { year: p.year, month: p.month + 1 });
    };
    const goToday = () => {
      const d = new Date();
      setTlMonth({ year: d.getFullYear(), month: d.getMonth() });
    };

    const monthName = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    return (
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        minHeight: 'calc(100vh - var(--nav-height))',
        background: 'var(--surface)'
      }}>

          padding: '16px 24px',
          borderBottom: '1px solid var(--border)',

          justifyContent: 'space-between',
          alignItems: 'center',
          flexWrap: 'wrap',
          gap: '12px'
        }}>
          <div>
            <h2 style={{
              fontFamily: "'Instrument Serif'",
              fontSize: '24px',
              marginBottom: '4px',
              color: 'var(--charcoal)'
            }}>Timeline View</h2>
            <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: 0 }}>
              {allPlans.length} plans across {Object.keys(plansByObjective).length} objectives
            </p>
          </div>
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
            <button onClick={prevMonth} style={{
              padding: '8px 12px',
              border: '1px solid var(--border)',
              background: 'var(--card)',
              borderRadius: 'var(--radius-sm)',
              cursor: 'pointer',
              fontSize: '13px'
            }}>← Prev</button>
            <div style={{
              minWidth: '160px',
              textAlign: 'center',
              fontSize: '14px',
              fontWeight: 600,
              color: 'var(--charcoal)'
            }}>{monthName}</div>
            <button onClick={nextMonth} style={{
              padding: '8px 12px',
              border: '1px solid var(--border)',
              background: 'var(--card)',
              borderRadius: 'var(--radius-sm)',
              cursor: 'pointer',
              fontSize: '13px'
            }}>Next →</button>
            <button onClick={goToday} style={{
              padding: '8px 12px',
              border: '1px solid var(--border)',
              background: 'var(--teal-light)',
              color: 'white',
              borderRadius: 'var(--radius-sm)',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 600
            }}>Today</button>
          </div>
        </div>

        <div style={{
          display: 'flex',
          flex: 1,
          overflow: 'hidden',
          borderTop: '1px solid var(--border)'
        }}>
          {/* LEFT SIDEBAR */}
          <div style={{
            width: '240px',
            borderRight: '1px solid var(--border)',
            overflowY: 'auto',
            background: 'var(--card)',
            padding: '16px 12px'
          }}>
            {Object.entries(plansByObjective).map(([objName, plans]) => (
              <div key={objName} style={{ marginBottom: '20px' }}>
                <div style={{
                  fontSize: '11px',
                  fontWeight: 700,
                  color: 'var(--text-muted)',
                  textTransform: 'uppercase',
                  letterSpacing: '0.5px',
                  marginBottom: '10px',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px'
                }}>
                  <span>{objName.substring(0, 20)}</span>
                  <span style={{ fontSize: '10px' }}>| {plans.length}</span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                  {plans.map(plan => (
                    <div
                      key={plan.id}
                      onClick={() => setEditingPlan(plan)}
                      style={{
                        padding: '7px 8px',
                        borderRadius: '4px',
                        background: 'var(--surface)',
                        border: '1px solid var(--border)',
                        cursor: 'pointer',
                        fontSize: '11px',
                        color: 'var(--charcoal)',
                        transition: 'all 0.2s',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '5px'
                      }}
                      onMouseEnter={(e) => {
                        e.currentTarget.style.background = 'var(--pale-bg)';
                        e.currentTarget.style.borderColor = 'var(--teal)';
                      }}
                      onMouseLeave={(e) => {
                        e.currentTarget.style.background = 'var(--surface)';
                        e.currentTarget.style.borderColor = 'var(--border)';
                      }}
                    >
                      <StatusIcon status={plan.status} size={14} />
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {plan.name}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* DAY GRID */}
          <div style={{
            flex: 1,
            overflowX: 'auto',
            overflowY: 'auto',
            background: 'var(--card)'
          }} ref={tlScrollRef}>
            <div style={{ padding: '16px', minWidth: 'fit-content' }}>
              {/* Day headers */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: `repeat(${daysInMonth}, 48px)`,
                gap: '0',
                marginBottom: '16px',
                position: 'sticky',
                top: 0,
                zIndex: 10,
                background: 'var(--card)',
                paddingBottom: '8px',
                borderBottom: '1px solid var(--border)'
              }}>
                {Array.from({ length: daysInMonth }, (_, i) => (
                  <div
                    key={`day-${i}`}
                    style={{
                      textAlign: 'center',
                      fontSize: '11px',
                      fontWeight: 600,
                      color: todayDate === i + 1 ? 'var(--teal)' : 'var(--text-muted)',
                      padding: '8px 0',
                      backgroundColor: todayDate === i + 1 ? 'rgba(42, 107, 107, 0.08)' : 'transparent',
                      borderRight: '1px solid var(--border-dark)',
                      borderLeft: i === 0 ? 'none' : 'none'
                    }}
                  >
                    {i + 1}
                  </div>
                ))}
              </div>

              {/* Plan bars for each objective group */}
              {Object.entries(plansByObjective).map(([objName, plans]) => (
                <div key={`bars-${objName}`} style={{ marginBottom: '24px' }}>
                  {plans.map((plan, idx) => {
                    const { startDay, endDay } = getPlanDayRange(plan);
                    const barWidth = (endDay - startDay + 1) * 48;
                    const offsetLeft = (startDay - 1) * 48;

                    // Status-based colors
                    let barColor = '#E8E5DC';
                    let barBorder = '#D0CBC4';
                    if (plan.status === STATUS.SEED) {
                      barColor = '#D0CBC4';
                      barBorder = '#B8B3AA';
                    } else if (plan.status === STATUS.SPROUTING) {
                      barColor = '#E8C9A4';
                      barBorder = '#D4A574';
                    } else if (plan.status === STATUS.BUDDING) {
                      barColor = '#A8B5AB';
                      barBorder = '#8A9B8E';
                    } else if (plan.status === STATUS.BLOOMED) {
                      barColor = '#8A9B8E';
                      barBorder = '#6B7F70';
                    }

                    return (
                      <div
                        key={plan.id}
                        style={{
                          position: 'relative',
                          height: '40px',
                          marginBottom: '6px',
                          display: 'flex',
                          alignItems: 'center',
                          cursor: 'pointer'
                        }}
                      >
                        <button
                          onClick={() => setEditingPlan(plan)}
                          onKeyPress={(e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                              e.preventDefault();
                              setEditingPlan(plan);
                            }
                          }}
                          title={`${plan.name} - ${plan.progress}% complete - Owner: ${plan.owner || 'Unassigned'} - Start: ${new Date(plan.startDate).toLocaleDateString()} End: ${new Date(plan.targetDate).toLocaleDateString()}`}
                          aria-label={`${plan.name}, ${plan.progress}% complete, Status: ${plan.status}, Start: ${new Date(plan.startDate).toLocaleDateString()}, End: ${new Date(plan.targetDate).toLocaleDateString()}`}
                          style={{
                            position: 'absolute',
                            left: offsetLeft,
                            width: barWidth,
                            height: '32px',
                            background: barColor,
                            borderRadius: '4px',
                            padding: '6px 10px',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '6px',
                            overflow: 'hidden',
                            whiteSpace: 'nowrap',
                            boxShadow: 'var(--shadow-sm)',
                            transition: 'all 0.2s',
                            border: `1px solid ${barBorder}`,
                            color: 'var(--charcoal)',
                            fontSize: '11px',
                            fontWeight: 600,
                            cursor: 'pointer'
                          }}
                          onMouseEnter={(e) => {
                            e.currentTarget.style.boxShadow = 'var(--shadow-md)';
                            e.currentTarget.style.transform = 'translateY(-2px)';
                          }}
                          onMouseLeave={(e) => {
                            e.currentTarget.style.boxShadow = 'var(--shadow-sm)';
                            e.currentTarget.style.transform = 'translateY(0)';
                          }}
                        >
                          <span>{plan.name}</span>
                          <span style={{ marginLeft: 'auto', fontSize: '10px', opacity: 0.7 }}>{plan.progress}%</span>
                        </button>
                      </div>
                    );
                  })}
                </div>
              ))}

              {/* Today marker */}
              {isCurrentMonth && todayDate > 0 && (
                <div style={{
                  position: 'absolute',
                  left: 240 + todayDate * 48 - 24,
                  top: 0,
                  width: '2px',
                  height: '100%',
                  background: 'var(--teal)',
                  zIndex: 5,
                  pointerEvents: 'none'
                }} />
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }


  // ============================================================
  // NAVBAR
  // ============================================================
  function renderNavbar() {
    return (
      <nav role="navigation" aria-label="Main navigation" style={{
        position: 'fixed',
        top: 0,
        left: 0,
        right: 0,
        backgroundColor: 'rgba(250, 250, 247, 0.95)',
        borderBottom: '1px solid var(--border)',
        backdropFilter: 'blur(10px)',
        zIndex: 100,
        height: isMobile ? undefined : 'var(--nav-height)',
        display: isMobile ? 'none' : 'flex',
        alignItems: 'center',
        padding: '0 20px',
        justifyContent: 'space-between'
      }}>
        <h1 style={{
          fontFamily: "'Instrument Serif'",
          fontSize: '18px',
          color: 'var(--charcoal)',
          margin: 0
        }}>
          ImpactQ {APP_VERSION}
        </h1>
        <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
          {['garden', 'timeline'].map(v => (
            <button
              key={v}
              onClick={() => {
                setCurrentView(v);
                setSelectedObjective(null);
                setBloomDropdown(false);
              }}
              aria-current={currentView === v ? 'page' : undefined}
              style={{
                padding: '8px 16px',
                borderRadius: 'var(--radius-md)',
                border: 'none',
                backgroundColor: currentView === v ? 'var(--teal)' : 'transparent',
                color: currentView === v ? 'white' : 'var(--text-secondary)',
                cursor: 'pointer',
                fontSize: '13px',
                fontWeight: 500,
                transition: 'all var(--transition)'
              }}>
              {v.charAt(0).toUpperCase() + v.slice(1)}
            </button>
          ))}

          {/* Bloom tab with hover dropdown */}
          <div
            style={{ position: 'relative' }}
            onMouseEnter={() => setBloomDropdown(true)}
            onMouseLeave={() => setBloomDropdown(false)}
          >
            <button
              onClick={() => {
                if (selectedObjective) {
                  setCurrentView('bloom');
                } else {
                  setBloomDropdown(!bloomDropdown);
                }
              }}
              aria-current={currentView === 'bloom' ? 'page' : undefined}
              style={{
                padding: '8px 16px',
                borderRadius: 'var(--radius-md)',
                border: 'none',
                backgroundColor: currentView === 'bloom' ? 'var(--teal)' : 'transparent',
                color: currentView === 'bloom' ? 'white' : 'var(--text-secondary)',
                cursor: 'pointer',
                fontSize: '13px',
                fontWeight: 500,
                transition: 'all var(--transition)',
                display: 'flex',
                alignItems: 'center',
                gap: '4px'
              }}>
              Bloom <span style={{ fontSize: '10px', opacity: 0.7 }}>▾</span>
            </button>

            {bloomDropdown && objectives.length > 0 && (
              <div style={{
                position: 'absolute',
                top: '100%',
                left: '50%',
                transform: 'translateX(-50%)',
                marginTop: '4px',
                backgroundColor: 'var(--card)',
                border: '1px solid var(--border)',
                borderRadius: 'var(--radius-md)',
                boxShadow: 'var(--shadow-lg)',
                minWidth: '240px',
                zIndex: 200,
                overflow: 'hidden',
                animation: 'slideDown 0.15s ease-out'
              }}>
                <div style={{
                  padding: '8px 12px',
                  fontSize: '11px',
                  fontWeight: 600,
                  color: 'var(--text-muted)',
                  textTransform: 'uppercase',
                  letterSpacing: '0.05em',
                  borderBottom: '1px solid var(--border)'
                }}>
                  Select Initiative
                </div>
                {objectives.map(obj => {
                  const health = calcHealth(obj.plans);
                  return (
                    <button
                      key={obj.id}
                      onClick={() => {
                        setSelectedObjective(obj);
                        setCurrentView('bloom');
                        setBloomDropdown(false);
                      }}
                      style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: '10px',
                        width: '100%',
                        padding: '10px 12px',
                        border: 'none',
                        background: selectedObjective && selectedObjective.id === obj.id ? 'rgba(42,107,107,0.06)' : 'transparent',
                        cursor: 'pointer',
                        fontSize: '13px',
                        color: 'var(--charcoal)',
                        textAlign: 'left',
                        transition: 'background 0.1s',
                        borderBottom: '1px solid var(--border)'
                      }}
                      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(42,107,107,0.05)'}
                      onMouseLeave={(e) => e.currentTarget.style.background = selectedObjective && selectedObjective.id === obj.id ? 'rgba(42,107,107,0.06)' : 'transparent'}
                    >
                      <div style={{
                        width: '8px', height: '8px', borderRadius: '50%',
                        backgroundColor: healthColor(health), flexShrink: 0
                      }} />
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {obj.title}
                      </span>
                      <span style={{ fontSize: '11px', color: 'var(--text-muted)', flexShrink: 0 }}>
                        {health}%
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </div>
        <button onClick={() => setShowImportModal(true)} style={{
          padding: '8px 16px',
          borderRadius: 'var(--radius-md)',
          border: '1px solid var(--teal)',
          backgroundColor: 'transparent',
          color: 'var(--teal)',
          cursor: 'pointer',
          fontSize: '13px',
          fontWeight: 500,
          transition: 'all var(--transition)'
        }}>
          Import Plan
        </button>
        <button
          className="action-button"
          onClick={() => setCurrentView('present')}
          title="View presentation"
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: '6px',
            padding: '8px 16px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--gold)',
            backgroundColor: 'rgba(212, 165, 116, 0.08)',
            color: 'var(--charcoal)',
            cursor: 'pointer',
            fontSize: '13px',
            fontWeight: 500,
            transition: 'all var(--transition)'
          }}
        >
          <svg width="16" height="16" viewBox="0 0 48 48" fill="none" style={{ flexShrink: 0 }}>
            {[0,1,2,3,4].map(i => {
              const angle = (i / 5) * 360 - 90;
              const rad = angle * Math.PI / 180;
              const cx = 24 + Math.cos(rad) * 11;
              const cy = 24 + Math.sin(rad) * 11;
              return <ellipse key={i} cx={cx} cy={cy} rx="6.5" ry="10" fill="#D4A574" opacity={0.8 + i * 0.04} transform={`rotate(${angle + 90} ${cx} ${cy})`} />;
            })}
            <circle cx="24" cy="24" r="6" fill="#D4A574" opacity="0.95" />
            <circle cx="24" cy="24" r="3" fill="#FFF" opacity="0.5" />
          </svg>
          Present
        </button>
      </nav>
    );
  }

  // ============================================================
  // MOBILE NAV
  // ============================================================
  function renderMobileNav() {
    if (!isMobile) return null;
    return (
      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        backgroundColor: 'rgba(250, 250, 247, 0.95)',
        borderTop: '1px solid var(--border)',
        backdropFilter: 'blur(10px)',
        display: 'flex',
        justifyContent: 'space-around',
        zIndex: 100,
        height: 'var(--mobile-nav)',
        paddingBottom: 'max(8px, env(safe-area-inset-bottom))'
      }}>
        {[
          { id: 'present', label: 'Present', icon: '✿' },
          { id: 'garden', label: 'Garden', icon: '🌿' },
          { id: 'timeline', label: 'Timeline', icon: '📅' },
          { id: 'bloom', label: 'Bloom', icon: '🌸' }
        ].map(t => (
          <button key={t.id} onClick={() => {
            setCurrentView(t.id);
            if (t.id !== 'bloom') setSelectedObjective(null);
          }} style={{
            flex: 1,
            background: 'none',
            border: 'none',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '4px',
            color: currentView === t.id ? 'var(--teal)' : 'var(--text-muted)',
            fontSize: '12px',
            cursor: 'pointer',
            padding: '8px',
            transition: 'color var(--transition)'
          }}>
            <span style={{ fontSize: '20px' }}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    );
  }

  // ============================================================
  // RENDER
  // ============================================================
  const currentContent = selectedObjective && currentView === 'bloom'
    ? renderBloomView()
    : currentView === 'present'
      ? renderPresentView()
      : currentView === 'timeline'
        ? renderTimelineView()
        : renderGardenView();

  return (
    <>
      <LoadingOverlay isLoading={isLoading} />
      {!isLoggedIn ? (
        <LoginPage onLogin={setIsLoggedIn} />
      ) : (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      minHeight: '100vh',
      backgroundColor: 'var(--surface)'
    }}>
      {renderNavbar()}
      <main style={{
        flex: 1,
        marginTop: isMobile ? 0 : 'var(--nav-height)',
        paddingTop: isMobile ? '12px' : '20px'
      }}>
        {currentContent}
      </main>
      {renderMobileNav()}

      <AddObjectiveModal
        isOpen={showAddObjective}
        onClose={() => setShowAddObjective(false)}
        onAdd={({ title, description, traction }) => {
          const newObj = createObjective(title, description, traction);
          setObjectives([...objectives, newObj]);
        }}
      />

      <AddPlanModal
        isOpen={showAddPlan}
        onClose={() => setShowAddPlan(false)}
        onAdd={({ title, owner, targetDate, startDate }) => {
          if (selectedObjective) {
            const newPlan = createPlan(title, STATUS.SEED, owner, 0, targetDate, startDate);
            const updated = {
              ...selectedObjective,
              plans: [...selectedObjective.plans, newPlan]
            };
            setSelectedObjective(updated);
            setObjectives(objectives.map(o => o.id === selectedObjective.id ? updated : o));
          }
        }}
      />

      <EditObjectiveModal
        isOpen={!!editingObjective}
        onClose={() => setEditingObjective(null)}
        objective={editingObjective}
        onSave={(updatedObj) => {
          setObjectives(objectives.map(o => o.id === updatedObj.id ? updatedObj : o));
          if (selectedObjective && selectedObjective.id === updatedObj.id) {
            setSelectedObjective(updatedObj);
          }
          setEditingObjective(null);
        }}
      />

      <EditPlanModal
        isOpen={!!editingPlan}
        onClose={() => setEditingPlan(null)}
        plan={editingPlan}
        onSave={(updatedPlan) => {
          const updatePlanInObjectives = (objs) => objs.map(obj => ({
            ...obj,
            plans: obj.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
          }));
          setObjectives(updatePlanInObjectives(objectives));
          if (selectedObjective) {
            setSelectedObjective({
              ...selectedObjective,
              plans: selectedObjective.plans.map(p => p.id === updatedPlan.id ? updatedPlan : p)
            });
          }
          setEditingPlan(null);
        }}
      />

      <Modal
        isOpen={showImportModal}
        title="Import Strategic Plan"
        onClose={() => {
          setShowImportModal(false);
          setImportText('');
        }}
        footer={
          <>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: '1px solid var(--border)',
              background: 'var(--card)',
              color: 'var(--charcoal)',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Cancel
            </button>
            <button onClick={() => {
              setShowImportModal(false);
              setImportText('');
            }} style={{
              padding: '8px 16px',
              borderRadius: 'var(--radius-md)',
              border: 'none',
              background: 'var(--teal)',
              color: 'white',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 500,
              transition: 'all var(--transition)'
            }}>
              Parse & Import
            </button>
          </>
        }
      >
        <textarea
          placeholder="Paste your strategic plan document here..."
          value={importText}
          onChange={(e) => setImportText(e.target.value)}
          style={{
            width: '100%',
            height: '200px',
            padding: '12px',
            borderRadius: 'var(--radius-md)',
            border: '1px solid var(--border)',
            fontFamily: 'monospace',
            fontSize: '12px',
            color: 'var(--charcoal)',
            resize: 'none',
            marginBottom: '12px'
          }}
        />
        <p style={{ fontSize: '12px', color: 'var(--text-muted)', margin: 0 }}>
          The app will parse headers, numbered lists, and bullet points to extract objectives and tactical plans.
        </p>
      </Modal>
    </div>
      )}
    </>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
